          (h.date_hired ? '<span class="win-tag date-tag">\u2714 Hired ' + fmtDate(h.date_hired) + '</span>' : '<span class="win-tag date-tag">\u2714 Hired</span>') +
          (h.candidate_location ? '<span class="win-tag location-tag">\uD83D\uDCCD ' + escHTML(h.candidate_location) + '</span>' : '') +
          '</div></div>';
      });
      html += '</div>';
    }
    html += '</div></div>';
  }

  // Open Jobs section — jobs that need candidates (with filters)
  if (FULFILLMENT_DATA && FULFILLMENT_DATA.length > 0) {
    // Base pool: jobs with unfilled openings needing candidates
    var openJobsAll = FULFILLMENT_DATA.filter(function(j) {
      var unfilled = (j.openings || 1) - (j.hired_count || 0);
      return unfilled > 0 && (j.active_candidates || 0) < unfilled;
    });

    // Collect unique values for filter dropdowns (from unfiltered pool)
    var ojBUs = []; var ojProjects = []; var ojRoles = []; var ojStatuses = [];
    var _buSet = {}, _projSet = {}, _roleSet = {}, _statusSet = {};
    openJobsAll.forEach(function(j) {
      if (j.bu && !_buSet[j.bu]) { _buSet[j.bu] = 1; ojBUs.push(j.bu); }
      if (j.project_name && !_projSet[j.project_name]) { _projSet[j.project_name] = 1; ojProjects.push(j.project_name); }
      if (j.role_title && !_roleSet[j.role_title]) { _roleSet[j.role_title] = 1; ojRoles.push(j.role_title); }
      if (j.status && !_statusSet[j.status]) { _statusSet[j.status] = 1; ojStatuses.push(j.status); }
    });
    ojBUs.sort(); ojProjects.sort(); ojRoles.sort();

    // Apply filters
    var openJobs = openJobsAll.filter(function(j) {
      if (ojFilterBU && j.bu !== ojFilterBU) return false;
      if (ojFilterProject && j.project_name !== ojFilterProject) return false;
      if (ojFilterRole && j.role_title !== ojFilterRole) return false;
      if (ojFilterStatus && j.status !== ojFilterStatus) return false;
      return true;
    }).sort(function(a, b) {
      if (a.total_candidates === 0 && b.total_candidates > 0) return -1;
      if (b.total_candidates === 0 && a.total_candidates > 0) return 1;
      return (a.active_candidates || 0) - (b.active_candidates || 0);
    });

    var hasActiveFilters = ojFilterBU || ojFilterProject || ojFilterRole || ojFilterStatus;

    if (openJobsAll.length > 0) {
      html += '<div class="open-jobs-section ' + (openJobsOpen ? 'open' : '') + '">' +
        '<div class="open-jobs-header" id="openJobsToggle"><svg class="open-jobs-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg>' +
        '<span class="open-jobs-icon">\uD83D\uDCCB</span><h2>Open Jobs</h2>' +
        '<div class="view-toggle">' +
          '<button class="view-toggle-btn' + (openJobsViewMode === 'card' ? ' active' : '') + '" data-view-toggle="oj-card" title="Card view">' +
            '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>' +
          '</button>' +
          '<button class="view-toggle-btn' + (openJobsViewMode === 'list' ? ' active' : '') + '" data-view-toggle="oj-list" title="List view">' +
            '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>' +
          '</button>' +
        '</div>' +
        '<span class="open-jobs-count">' + openJobsAll.length + ' Need Candidates</span></div>' +
        '<div class="open-jobs-body">' +
        '<div class="open-jobs-subtitle">These roles still need talent \u2014 prioritize sourcing for them.</div>';

      // Filter bar
      html += '<div class="open-jobs-filters">' +
        '<select class="oj-filter-select' + (ojFilterBU ? ' active-filter' : '') + '" id="ojFilterBU"><option value="">All Business Units</option>';
      ojBUs.forEach(function(bu) {
        html += '<option value="' + escHTML(bu) + '"' + (ojFilterBU === bu ? ' selected' : '') + '>' + escHTML(bu) + '</option>';
      });
      html += '</select>' +
        '<select class="oj-filter-select' + (ojFilterProject ? ' active-filter' : '') + '" id="ojFilterProject"><option value="">All Projects</option>';
      ojProjects.forEach(function(p) {
        html += '<option value="' + escHTML(p) + '"' + (ojFilterProject === p ? ' selected' : '') + '>' + escHTML(p) + '</option>';
      });
      html += '</select>' +
        '<select class="oj-filter-select' + (ojFilterRole ? ' active-filter' : '') + '" id="ojFilterRole"><option value="">All Roles</option>';
      ojRoles.forEach(function(r) {
        html += '<option value="' + escHTML(r) + '"' + (ojFilterRole === r ? ' selected' : '') + '>' + escHTML(r) + '</option>';
      });
      html += '</select>' +
        '<select class="oj-filter-select' + (ojFilterStatus ? ' active-filter' : '') + '" id="ojFilterStatus"><option value="">All Statuses</option>';
      JOB_STATUSES.forEach(function(s) {
        var inPool = _statusSet[s];
        html += '<option value="' + escHTML(s) + '"' + (ojFilterStatus === s ? ' selected' : '') + (inPool ? '' : ' disabled') + '>' + escHTML(s) + (inPool ? '' : ' (none)') + '</option>';
      });
      html += '</select>';
      if (hasActiveFilters) {
        html += '<button class="oj-filter-clear" id="ojFilterClear">\u2715 Clear Filters</button>';
      }
      html += '<span class="oj-filter-count">Showing ' + openJobs.length + ' of ' + openJobsAll.length + '</span>';
      html += '</div>';

      // Job cards / list
      if (openJobs.length === 0) {
        html += '<div style="padding: 20px 24px; text-align: center; color: #64748B; font-size: 14px;">No jobs match the selected filters.</div>';
      } else if (openJobsViewMode === 'list') {
        // List view
        html += '<div class="open-jobs-list"><table class="oj-list-table"><thead><tr>' +
          '<th>Role</th><th>BU</th><th>Openings</th><th>Candidates</th><th>Status</th><th>Max Rate</th><th>POC</th>' +
          '</tr></thead><tbody>';
        openJobs.forEach(function(j) {
          var unfilled = (j.openings || 1) - (j.hired_count || 0);
          html += '<tr data-expand-job="' + escHTML(j.id) + '">' +
            '<td><div class="role-cell">' + escHTML(j.role_title) + '<div class="sub">' + escHTML(j.project_name) + '</div></div></td>' +
            '<td><span class="open-job-tag bu-tag">' + escHTML(j.bu) + '</span></td>' +
            '<td>' + unfilled + ' of ' + (j.openings || 1) + '</td>' +
            '<td>';
          if (j.total_candidates === 0) {
            html += '<span style="color:#991B1B; font-size:12px;">\u26A0 None</span>';
          } else {
            html += '<span style="font-weight:600;">' + j.active_candidates + '</span> active / ' + j.total_candidates + ' total';
          }
          html += '</td>' +
            '<td>' + (j.status && j.status !== 'ACTIVE' ? '<span class="open-job-tag status-tag">' + escHTML(j.status) + '</span>' : '<span style="color:#166534;">Active</span>') + '</td>' +
            '<td>' + (j.rate_max ? '$' + j.rate_max + '/hr' : '\u2014') + '</td>' +
            '<td style="font-size:12px; color:var(--text-secondary);">' + escHTML(j.poc_names || '\u2014') + '</td>' +
            '</tr>';
          // If expanded, show detail row
          if (expandedJobIds.has(j.id)) {
            html += '<tr class="oj-list-detail-row"><td colspan="7"><div class="oj-detail" style="margin-top:0;">';
            // Reuse same candidate rendering
            if (j.candidates && j.candidates.length > 0) {
              var candGroups = {};
              var groupOrder = ['introduced','interview_scheduled','pending_interview','pending_decision','pending_2nd_interview','hired','rejected','withdrawn','unavailable','consider_other','removed_location','on_hold'];
              j.candidates.forEach(function(c) { var g = c._status || 'other'; if (!candGroups[g]) candGroups[g] = []; candGroups[g].push(c); });
              var orderedGroups = groupOrder.filter(function(g) { return candGroups[g]; });
              Object.keys(candGroups).forEach(function(g) { if (orderedGroups.indexOf(g) === -1) orderedGroups.push(g); });
              orderedGroups.forEach(function(groupKey) {
                var cands = candGroups[groupKey];
                var groupLabel = (STATUS_MAP[groupKey] || {}).label || groupKey.replace(/_/g, ' ').replace(/\b\w/g, function(l) { return l.toUpperCase(); });
                var groupColor = (STATUS_MAP[groupKey] || {}).color || '#64748B';
                html += '<div class="oj-cand-section"><div class="oj-cand-section-title"><span style="color:' + groupColor + '">\u25CF</span> ' + escHTML(groupLabel) + ' <span class="cand-count">' + cands.length + '</span></div>';
                cands.forEach(function(c) {
                  html += '<div class="oj-cand-row">' + avatarHTML(c.name, c.profile_link, 28);
                  html += c.profile_link ? '<span class="oj-cand-name"><a href="' + escHTML(c.profile_link) + '" target="_blank">' + escHTML(c.name) + '</a></span>' : '<span class="oj-cand-name">' + escHTML(c.name) + '</span>';
                  var details = [];
                  if (c.location) details.push('\uD83D\uDCCD ' + c.location);
                  if (c.rate) details.push('$' + c.rate + '/hr');
                  if (details.length) html += '<span class="oj-cand-detail">' + escHTML(details.join(' \u00B7 ')) + '</span>';
                  html += '</div>';
                });
                html += '</div>';
              });
            } else {
              html += '<div class="oj-no-candidates">No candidates submitted yet.</div>';
            }
            html += '</div></td></tr>';
          }
        });
        html += '</tbody></table></div>';
      } else {
        // Card view (existing)
        html += '<div class="open-jobs-grid">';
        openJobs.forEach(function(j) {
          var unfilled = (j.openings || 1) - (j.hired_count || 0);
          var isExpanded = expandedJobIds.has(j.id);
          html += '<div class="open-job-card' + (isExpanded ? ' expanded' : '') + '" data-expand-job="' + escHTML(j.id) + '">' +
            '<div class="open-job-title">' + escHTML(j.role_title) + '</div>' +
            '<div class="open-job-project">' + escHTML(j.project_name) + '</div>' +
            '<div class="open-job-meta">' +
            '<span class="open-job-tag bu-tag">' + escHTML(j.bu) + '</span>' +
            '<span class="open-job-tag openings-tag">\uD83D\uDC65 ' + unfilled + ' opening' + (unfilled > 1 ? 's' : '') + '</span>';
          if (j.total_candidates === 0) {
            html += '<span class="open-job-tag empty-tag">\u26A0\uFE0F No candidates yet</span>';
          } else {
            html += '<span class="open-job-tag candidates-tag">' + j.active_candidates + ' active / ' + j.total_candidates + ' total</span>';
          }
          if (j.status && j.status !== 'ACTIVE') {
            html += '<span class="open-job-tag status-tag">' + escHTML(j.status) + '</span>';
          }
          if (j.rate_max) {
            html += '<span class="open-job-tag rate-tag">\uD83D\uDCB0 $' + j.rate_max + '/hr max</span>';
          }
          html += '</div>';
          if (!isExpanded) {
            html += '<div class="expand-hint">' + (j.total_candidates > 0 ? 'Click to see ' + j.total_candidates + ' candidate' + (j.total_candidates > 1 ? 's' : '') : 'Click for details') + ' \u203A</div>';
          }

          // Expanded detail panel
          if (isExpanded) {
            html += '<div class="oj-detail">';

            // Job info grid
            html += '<div class="oj-detail-grid">';
            if (j.poc_names) html += '<div class="oj-detail-item"><div class="oj-detail-label">Point of Contact</div><div class="oj-detail-value">' + escHTML(j.poc_names) + '</div></div>';
            if (j.duration) html += '<div class="oj-detail-item"><div class="oj-detail-label">Duration</div><div class="oj-detail-value">' + escHTML(j.duration) + '</div></div>';
            if (j.rate_max) html += '<div class="oj-detail-item"><div class="oj-detail-label">Max Rate</div><div class="oj-detail-value">$' + j.rate_max + '/hr</div></div>';
            html += '<div class="oj-detail-item"><div class="oj-detail-label">Openings</div><div class="oj-detail-value">' + j.openings + ' total, ' + unfilled + ' unfilled</div></div>';
            if (j.notes) html += '<div class="oj-detail-item" style="grid-column:1/-1"><div class="oj-detail-label">Notes</div><div class="oj-detail-value">' + escHTML(j.notes) + '</div></div>';
            if (j.interview_context) html += '<div class="oj-detail-item" style="grid-column:1/-1"><div class="oj-detail-label">Interview Context</div><div class="oj-detail-value">' + escHTML(j.interview_context) + '</div></div>';
            html += '</div>';

            // Links
            var linksHtml = '';
            if (j.toptal_job_link) linksHtml += '<a href="' + escHTML(j.toptal_job_link) + '" target="_blank" style="font-size:12px; color:var(--toptal-blue); margin-right:14px;">Toptal Job \u2197</a>';
            if (j.salesforce_link) linksHtml += '<a href="' + escHTML(j.salesforce_link) + '" target="_blank" style="font-size:12px; color:var(--toptal-blue); margin-right:14px;">Salesforce \u2197</a>';
            if (j.slack_channel) linksHtml += '<span style="font-size:12px; color:var(--text-secondary);">Slack: ' + escHTML(j.slack_channel) + '</span>';
            if (linksHtml) html += '<div style="margin-bottom:14px;">' + linksHtml + '</div>';

            // Candidates grouped by status
            if (j.candidates && j.candidates.length > 0) {
              var candGroups = {};
              var groupOrder = ['introduced','interview_scheduled','pending_interview','pending_decision','pending_2nd_interview','hired','rejected','withdrawn','unavailable','consider_other','removed_location','on_hold'];
              j.candidates.forEach(function(c) {
                var g = c._status || 'other';
                if (!candGroups[g]) candGroups[g] = [];
                candGroups[g].push(c);
              });

              // Render each group
              var orderedGroups = groupOrder.filter(function(g) { return candGroups[g]; });
              // Add any remaining groups not in the order
              Object.keys(candGroups).forEach(function(g) { if (orderedGroups.indexOf(g) === -1) orderedGroups.push(g); });

              orderedGroups.forEach(function(groupKey) {
                var cands = candGroups[groupKey];
                var groupLabel = (STATUS_MAP[groupKey] || {}).label || groupKey.replace(/_/g, ' ').replace(/\b\w/g, function(l) { return l.toUpperCase(); });
                var groupColor = (STATUS_MAP[groupKey] || {}).color || '#64748B';
                var badgeClass = 'other';
                if (groupKey === 'introduced') badgeClass = 'introduced';
                else if (groupKey.includes('interview') || groupKey === 'pending_interview') badgeClass = 'interview';
                else if (groupKey.includes('pending') || groupKey.includes('decision')) badgeClass = 'pending';
                else if (groupKey === 'hired') badgeClass = 'hired';
                else if (groupKey === 'rejected' || groupKey === 'client_rejected') badgeClass = 'rejected';

                html += '<div class="oj-cand-section">';
                html += '<div class="oj-cand-section-title"><span style="color:' + groupColor + '">\u25CF</span> ' + escHTML(groupLabel) + ' <span class="cand-count">' + cands.length + '</span></div>';

                cands.forEach(function(c) {
                  html += '<div class="oj-cand-row">';
                  html += avatarHTML(c.name, c.profile_link, 28, c.avatar_url);
                  if (c.profile_link) {
                    html += '<span class="oj-cand-name"><a href="' + escHTML(c.profile_link) + '" target="_blank">' + escHTML(c.name) + '</a></span>';
                  } else {
                    html += '<span class="oj-cand-name">' + escHTML(c.name) + '</span>';
                  }
                  var details = [];
                  if (c.location) details.push('\uD83D\uDCCD ' + c.location);
                  if (c.rate) details.push('$' + c.rate + '/hr');
                  if (c.date_introduced) details.push('Intro: ' + fmtDate(c.date_introduced));
                  if (c.date_interview) details.push('Interview: ' + fmtDate(c.date_interview));
                  if (details.length) html += '<span class="oj-cand-detail">' + escHTML(details.join(' \u00B7 ')) + '</span>';
                  if (c.client_feedback) html += '<span class="oj-cand-detail" style="color:#92400E;" title="Client feedback">\uD83D\uDCAC ' + escHTML(c.client_feedback.substring(0, 60)) + (c.client_feedback.length > 60 ? '...' : '') + '</span>';
                  if (c.rejection_reason && badgeClass === 'rejected') html += '<span class="oj-cand-detail" style="color:#991B1B;">\u2715 ' + escHTML(c.rejection_reason.substring(0, 60)) + '</span>';
                  html += '</div>';
                });

                html += '</div>';
              });
            } else {
              html += '<div class="oj-no-candidates">No candidates have been submitted yet. Use the chat to add candidates to this role.</div>';
            }

            html += '</div>'; // close oj-detail
          }

          html += '</div>'; // close open-job-card
        });
        html += '</div>';
      }

      html += '</div></div>';
    }
  }

  // BU accordion
  if (filtered.length === 0) {
    html += '<div class="no-results">No talent found matching your filters.</div>';
  } else {
    filtered.forEach(function(bu) {
      var buKey = bu.businessUnit;
      var buTalentCount = bu.projects.reduce(function(s,p){return s+p.talent.length;},0);
      var buOpen = openBUs.has(buKey);
      html += '<div class="bu-section ' + (buOpen?'open':'') + '">' +
        '<div class="bu-header" data-toggle-bu="' + escHTML(buKey) + '">' +
        '<svg class="bu-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg>' +
        '<div class="bu-color-bar" style="background:'+bu.color+'"></div>' +
        '<div class="bu-icon" style="background:'+bu.color+'11; color:'+bu.color+'">'+(BU_ICONS[bu.businessUnit]||DEFAULT_BU_ICON)+'</div>' +
        '<div class="bu-title">'+escHTML(bu.businessUnit)+'</div>' +
        '<div class="bu-meta"><div class="bu-stat"><strong>'+bu.projects.length+'</strong> project'+(bu.projects.length>1?'s':'')+'</div>' +
        '<div class="bu-stat"><strong>'+buTalentCount+'</strong> candidate'+(buTalentCount>1?'s':'')+'</div></div></div>' +
        '<div class="bu-body">';

      bu.projects.forEach(function(proj) {
        var projKey = buKey + '::' + proj.name;
        var projOpen = openProjects.has(projKey);
        var projStatuses = {};
        proj.talent.forEach(function(t) { projStatuses[t.status] = (projStatuses[t.status]||0)+1; });

        html += '<div class="project-section '+(projOpen?'open':'')+'">' +
          '<div class="project-header" data-toggle-project="'+escHTML(projKey)+'">' +
          '<svg class="project-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg>' +
          '<div class="project-name">'+escHTML(proj.name)+'</div>';
        if (proj.poc) html += '<div class="poc-badge">Y! POC(s): <span>'+escHTML(proj.poc)+'</span></div>';
        html += '<div class="project-statuses">';
        Object.entries(projStatuses).forEach(function(se) {
          var st = se[0], count = se[1];
          var c = (STATUS_MAP[st]||{}).color||'#888';
          for (var i=0;i<count;i++) html += '<span class="mini-pip" style="background:'+c+'" title="'+((STATUS_MAP[st]||{}).label||st)+'"></span>';
        });
        html += '</div><div class="project-count">'+proj.talent.length+' talent</div></div>';
        html += '<div class="project-body"><table class="talent-table"><thead><tr><th>Candidate</th><th>Status</th><th>Introduced</th></tr></thead><tbody>';
        proj.talent.forEach(function(t) {
          var cfg = STATUS_MAP[t.status]||{};
          var days = daysSince(t.updatedAt || t.date);
          html += '<tr><td><div class="talent-name-cell">' + avatarHTML(t.name, t.profileLink, 32, t.avatarUrl) +
            '<div><div class="talent-label">'+escHTML(t.name)+'</div><div class="talent-role">'+escHTML(t.role)+'</div>' +
            '<div class="talent-location">'+escHTML(t.location)+'</div></div></div></td>' +
            '<td><span class="status-badge '+(cfg.cls||'')+'"><span class="pip"></span>'+escHTML(cfg.label||t.status)+'</span>'+stalenessHTML(days)+'</td>' +
            '<td class="date-cell">'+fmtDate(t.date)+'</td></tr>';
        });
        html += '</tbody></table></div></div>';
      });
      html += '</div></div>';
    });
  }
  return html;
}

function renderFulfillmentView() {
  var html = '';
  if (!FULFILLMENT_DATA || FULFILLMENT_DATA.length === 0) {
    return '<div class="no-results">No fulfillment data available.</div>';
  }
  html += '<div class="fulfillment-grid">';
  FULFILLMENT_DATA.forEach(function(job) {
    var buColor = BU_COLORS[job.bu] || DEFAULT_BU_COLOR;
    var total = (job.total_candidates || 0);
    var active = (job.active_candidates || 0);
    var hiredCount = (job.hired_count || 0);
    var rejected = (job.rejected_count || 0);
    var openings = (job.openings || 1);
    var fillPct = openings > 0 ? Math.min(100, Math.round((hiredCount / openings) * 100)) : 0;
    var barColor = fillPct >= 100 ? 'var(--green)' : fillPct >= 50 ? 'var(--amber)' : 'var(--toptal-blue)';
    var needsAttention = (job.needs_attention || 0) > 0;
    var daysSinceContact = job.days_since_contact ? Math.round(job.days_since_contact) : null;

    html += '<div class="fulfillment-card">' +
      '<div class="fulfillment-card-header">' +
      '<div class="fulfillment-card-title">' + escHTML(job.project_name || '') + ' &mdash; ' + escHTML(job.role_title || '') +
      '<span class="fulfillment-card-bu" style="background:'+buColor+'15;color:'+buColor+'">'+escHTML(job.bu||'')+'</span></div>';
    if (needsAttention) {
      html += '<span class="needs-attention-badge">\u26A0 Needs Attention</span>';
    }
    html += '</div><div class="fulfillment-metrics">' +
      '<div class="fulfillment-metric"><div class="metric-value" style="color:var(--toptal-dark)">'+openings+'</div><div class="metric-label">Openings</div></div>' +
      '<div class="fulfillment-metric"><div class="metric-value" style="color:var(--toptal-blue)">'+total+'</div><div class="metric-label">Total</div></div>' +
      '<div class="fulfillment-metric"><div class="metric-value" style="color:var(--violet)">'+active+'</div><div class="metric-label">Active</div></div>' +
      '<div class="fulfillment-metric"><div class="metric-value" style="color:var(--green)">'+hiredCount+'</div><div class="metric-label">Hired</div></div>' +
      '<div class="fulfillment-metric"><div class="metric-value" style="color:var(--rose)">'+rejected+'</div><div class="metric-label">Rejected</div></div>';
    if (daysSinceContact !== null) {
      var contactColor = daysSinceContact >= 7 ? 'var(--rose)' : daysSinceContact >= 3 ? 'var(--amber)' : 'var(--green)';
      html += '<div class="fulfillment-metric"><div class="metric-value" style="color:'+contactColor+'">'+daysSinceContact+'d</div><div class="metric-label">Since Contact</div></div>';
    }
    html += '</div><div class="fulfillment-bar"><div class="fulfillment-bar-fill" style="width:'+fillPct+'%;background:'+barColor+'"></div></div>';

    // Links
    html += '<div class="fulfillment-links">';
    if (job.toptal_job_link) html += '<a class="fulfillment-link" href="'+escHTML(job.toptal_job_link)+'" target="_blank">Toptal Job</a>';
    if (job.salesforce_link) html += '<a class="fulfillment-link" href="'+escHTML(job.salesforce_link)+'" target="_blank">Salesforce</a>';
    if (job.slack_channel) html += '<a class="fulfillment-link" href="'+escHTML(job.slack_channel)+'" target="_blank">Slack</a>';
    html += '</div></div>';
  });
  html += '</div>';
  return html;
}

//  EVENTS

function bindEvents() {
  // Filter buttons
  document.querySelectorAll('.filter-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var s = btn.dataset.status;
      if (activeFilters.has(s)) activeFilters.delete(s); else activeFilters.add(s);
      render();
    });
  });

  // Search
  var searchEl = document.getElementById('searchInput');
  if (searchEl) {
    searchEl.addEventListener('input', function(e) {
      searchQuery = e.target.value.toLowerCase();
      var pos = e.target.selectionStart;
      render();
      var inp = document.getElementById('searchInput');
      if (inp) { inp.focus(); inp.setSelectionRange(pos, pos); }
    });
  }

  // BU toggles
  document.querySelectorAll('[data-toggle-bu]').forEach(function(el) {
    el.addEventListener('click', function() {
      var key = el.dataset.toggleBu;
      if (openBUs.has(key)) openBUs.delete(key); else openBUs.add(key);
      render();
    });
  });

  // Project toggles
  document.querySelectorAll('[data-toggle-project]').forEach(function(el) {
    el.addEventListener('click', function() {
      var key = el.dataset.toggleProject;
      if (openProjects.has(key)) openProjects.delete(key); else openProjects.add(key);
      render();
    });
  });

  // Expand all
  var expandBtn = document.getElementById('expandAllBtn');
  if (expandBtn) {
    expandBtn.addEventListener('click', function() {
      if (allExpanded) {
        openBUs.clear(); openProjects.clear(); allExpanded = false;
      } else {
        PIPELINE_DATA.forEach(function(bu) {
          openBUs.add(bu.businessUnit);
          bu.projects.forEach(function(p) { openProjects.add(bu.businessUnit + '::' + p.name); });
        });
        allExpanded = true;
      }
      render();
    });
  }

  // Refresh
  var refreshBtn = document.getElementById('refreshBtn');
  if (refreshBtn) {
    refreshBtn.addEventListener('click', function() {
      refreshBtn.classList.add('spinning');
      refreshData().then(function() { setTimeout(function() { var b = document.getElementById('refreshBtn'); if(b) b.classList.remove('spinning'); }, 600); });
    });
  }

  // Wins toggle
  var winsToggle = document.getElementById('winsToggle');
  if (winsToggle) {
    winsToggle.addEventListener('click', function(e) {
      if (e.target.closest('.view-toggle')) return; // don't collapse when clicking view toggle
      winsOpen = !winsOpen; render();
    });
  }

  var openJobsToggle = document.getElementById('openJobsToggle');
  if (openJobsToggle) {
    openJobsToggle.addEventListener('click', function(e) {
      if (e.target.closest('.view-toggle')) return;
      openJobsOpen = !openJobsOpen; render();
    });
  }

  // View toggle buttons (card/list)
  document.querySelectorAll('[data-view-toggle]').forEach(function(btn) {
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      var mode = btn.dataset.viewToggle;
      if (mode === 'wins-card') { winsViewMode = 'card'; render(); }
      else if (mode === 'wins-list') { winsViewMode = 'list'; render(); }
      else if (mode === 'oj-card') { openJobsViewMode = 'card'; render(); }
      else if (mode === 'oj-list') { openJobsViewMode = 'list'; render(); }
    });
  });

  // Open Jobs filters
  var ojBUEl = document.getElementById('ojFilterBU');
  if (ojBUEl) ojBUEl.addEventListener('change', function() { ojFilterBU = this.value; render(); });
  var ojProjEl = document.getElementById('ojFilterProject');
  if (ojProjEl) ojProjEl.addEventListener('change', function() { ojFilterProject = this.value; render(); });
  var ojRoleEl = document.getElementById('ojFilterRole');
  if (ojRoleEl) ojRoleEl.addEventListener('change', function() { ojFilterRole = this.value; render(); });
  var ojStatusEl = document.getElementById('ojFilterStatus');
  if (ojStatusEl) ojStatusEl.addEventListener('change', function() { ojFilterStatus = this.value; render(); });
  var ojClearEl = document.getElementById('ojFilterClear');
  if (ojClearEl) ojClearEl.addEventListener('click', function(e) {
    e.stopPropagation();
    ojFilterBU = ''; ojFilterProject = ''; ojFilterRole = ''; ojFilterStatus = '';
    render();
  });

  // Expand/collapse Open Job cards
  document.querySelectorAll('[data-expand-job]').forEach(function(el) {
    el.addEventListener('click', function(e) {
      if (e.target.closest('a') || e.target.closest('select') || e.target.closest('button')) return;
      var jobId = el.dataset.expandJob;
      if (expandedJobIds.has(jobId)) expandedJobIds.delete(jobId); else expandedJobIds.add(jobId);
      render();
    });
  });

  // View tabs
  document.querySelectorAll('.view-tab').forEach(function(tab) {
    tab.addEventListener('click', async function() {
      currentView = tab.dataset.view;
      if (currentView === 'admin' && adminMembers.length === 0) {
        await loadAdminData();
      }
      render();
    });
  });

  // Chat FAB
  var chatFab = document.getElementById('chatFab');
  if (chatFab) {
    chatFab.addEventListener('click', toggleChat);
  }

  // Quick-action buttons
  var quickAddJobBtn = document.getElementById('quickAddJob');
  if (quickAddJobBtn) {
    quickAddJobBtn.addEventListener('click', function() {
      showJobForm();
    });
  }
  var quickAddCandBtn = document.getElementById('quickAddCandidate');
  if (quickAddCandBtn) {
    quickAddCandBtn.addEventListener('click', function() {
      showCandidateForm();
    });
  }

  // User menu dropdown toggle
  var userMenuBtn = document.getElementById('userMenuBtn');
  var userDropdown = document.getElementById('userDropdown');
  if (userMenuBtn && userDropdown) {
    userMenuBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      userDropdown.classList.toggle('open');
    });
    document.addEventListener('click', function() {
      userDropdown.classList.remove('open');
    });
  }

  // Sign out
  var signOutBtn = document.getElementById('signOutBtn');
  if (signOutBtn) {
    signOutBtn.addEventListener('click', function() {
      sb.auth.signOut();
    });
  }

  // Admin: Invite
  var inviteSendBtn = document.getElementById('inviteSendBtn');
  if (inviteSendBtn) {
    inviteSendBtn.addEventListener('click', async function() {
      var email = document.getElementById('inviteEmail').value.trim();
      var name = document.getElementById('inviteName').value.trim();
      var msgEl = document.getElementById('inviteMsg');
      if (!email) { msgEl.textContent = 'Email is required'; msgEl.style.color = 'var(--rose)'; return; }

      inviteSendBtn.disabled = true;
      inviteSendBtn.textContent = 'Sending...';
      try {
        var token = await getAccessToken();
        var resp = await fetch('/api/invite', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
          body: JSON.stringify({ email: email, full_name: name })
        });
        var result = await resp.json();
        if (result.success) {
          adminInviteMsg = '<span style="color:var(--green)">Invitation sent to ' + escHTML(email) + '</span>';
          document.getElementById('inviteEmail').value = '';
          document.getElementById('inviteName').value = '';
        } else {
          adminInviteMsg = '<span style="color:var(--rose)">' + escHTML(result.error || 'Failed') + '</span>';
        }
      } catch(e) {
        adminInviteMsg = '<span style="color:var(--rose)">Network error</span>';
      }
      inviteSendBtn.disabled = false;
      inviteSendBtn.textContent = 'Invite';
      render();
    });
  }

  // Admin: Role toggle
  document.querySelectorAll('[data-toggle-role]').forEach(function(btn) {
    btn.addEventListener('click', async function() {
      var userId = btn.dataset.toggleRole;
      var newRole = btn.dataset.newRole;
      btn.disabled = true;
      btn.textContent = 'Updating...';
      try {
        var token = await getAccessToken();
        var resp = await fetch('/api/update-role', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
          body: JSON.stringify({ user_id: userId, role: newRole })
        });
        var result = await resp.json();
        if (result.success) {
          await loadAdminData();
          render();
        } else {
          alert(result.error || 'Failed to update role');
          btn.disabled = false;
          btn.textContent = 'Make ' + newRole;
        }
      } catch(e) {
        alert('Network error');
        btn.disabled = false;
        btn.textContent = 'Make ' + newRole;
      }
    });
  });

  bindAvatarClicks();
}

// Valid DB statuses (uppercase as stored in Supabase)
const VALID_DB_STATUSES = [
  'TALENT INTRODUCED', 'INTERVIEW SCHEDULED', 'PENDING DECISION',
  'PENDING 2ND INTERVIEW', 'HIRED-PENDING SOW', 'ACTIVE', 'REJECTED',
  'ENGAGEMENT COMPLETED', 'ON-HOLD', 'CANCELLED', 'CONSIDER FOR OTHER ROLE',
  'REMOVED DUE TO LOCATION', 'TALENT NO LONGER AVAILABLE', 'TALENT WITHDRAWN'
];

// Build rich context from live data for Claude
function buildChatContext() {
  var lines = [];
  lines.push('=== TALENT PIPELINE DATABASE CONTEXT ===');
  lines.push('Valid statuses: ' + VALID_DB_STATUSES.join(', '));
  lines.push('');

  // Jobs from fulfillment data
  if (FULFILLMENT_DATA && FULFILLMENT_DATA.length > 0) {
    lines.push('--- JOBS (' + FULFILLMENT_DATA.length + ' total) ---');
    FULFILLMENT_DATA.forEach(function(j) {
      lines.push('Job ID=' + j.id + ' | BU=' + j.bu + ' | Project=' + j.project_name +
        ' | Role=' + j.role_title + ' | Openings=' + j.openings +
        ' | Active=' + j.active_candidates + ' | Hired=' + j.hired_count +
        ' | Rejected=' + j.rejected_count + ' | NeedsAttention=' + j.needs_attention);
    });
    lines.push('');
  }

  // Pipeline talent (active candidates)
  lines.push('--- ACTIVE PIPELINE ---');
  var totalActive = 0;
  PIPELINE_DATA.forEach(function(bu) {
    bu.projects.forEach(function(p) {
      p.talent.forEach(function(t) {
        totalActive++;
        lines.push('BU=' + bu.name + ' | Project=' + p.name + ' | Candidate=' + t.name +
          ' | Role=' + t.role + ' | Status=' + t.status + ' | Location=' + t.location +
          ' | Introduced=' + (t.date || 'N/A') + ' | Interview=' + (t.interviewDate || 'N/A') +
          ' | POC=' + p.poc);
      });
    });
  });
  lines.push('Total active candidates: ' + totalActive);
  lines.push('');

  // Hired
  if (HIRED_DATA.length > 0) {
    lines.push('--- HIRED (' + HIRED_DATA.length + ') ---');
    HIRED_DATA.forEach(function(h) {
      lines.push('Candidate=' + h.candidate_name + ' | Role=' + h.role_title +
        ' | BU=' + h.bu + ' | Project=' + h.project_name +
        ' | HiredDate=' + (h.date_hired || 'N/A'));
    });
    lines.push('');
  }

  // Summary
  lines.push('--- SUMMARY ---');
  lines.push('Business Units: ' + PIPELINE_DATA.map(function(b){return b.name;}).join(', '));
  lines.push('Total active: ' + totalActive + ' | Total hired: ' + HIRED_DATA.length +
    ' | Total jobs: ' + (FULFILLMENT_DATA ? FULFILLMENT_DATA.length : 0));

  return lines.join('\n');
}

// Execute a tool call from Claude against Supabase
async function logActivity(entityType, entityId, action, opts) {
  opts = opts || {};
  try {
    await sb.from('activity_log').insert({
      entity_type: entityType,
      entity_id: entityId,
      action: action,
      old_value: opts.old_value || null,
      new_value: opts.new_value || null,
      note: opts.note || null,
      source: 'chat',
      created_by: currentUser ? currentUser.id : null
    });
  } catch(e) { /* non-blocking */ }
}

async function executeTool(toolName, toolInput) {
  switch (toolName) {
    case 'insert_job': {
      var row = {
        bu: toolInput.bu, project_name: toolInput.project_name,
        role_title: toolInput.role_title, openings: toolInput.openings || 1,
        created_by: currentUser ? currentUser.id : null,
      };
      if (toolInput.rate_max) row.rate_max = toolInput.rate_max;
      if (toolInput.duration) row.duration = toolInput.duration;
      if (toolInput.poc_names) row.poc_names = toolInput.poc_names;
      if (toolInput.poc_emails) row.poc_emails = toolInput.poc_emails;
      if (toolInput.notes) row.notes = toolInput.notes;
      if (toolInput.sow_number) row.sow_number = toolInput.sow_number;
      if (toolInput.salesforce_link) row.salesforce_link = toolInput.salesforce_link;
      if (toolInput.toptal_job_link) row.toptal_job_link = toolInput.toptal_job_link;
      var { data, error } = await sb.from('jobs').insert(row).select();
      if (error) return { error: error.message };
      await logActivity('job', data[0].id, 'insert', { note: row.role_title + ' (' + row.bu + ')' });
      return { success: true, job: data[0] };
    }
    case 'update_job': {
      toolInput.updates.updated_by = currentUser ? currentUser.id : null;
      var { data, error } = await sb.from('jobs')
        .update(toolInput.updates).eq('id', toolInput.job_id).select();
      if (error) return { error: error.message };
      await logActivity('job', toolInput.job_id, 'update', { new_value: JSON.stringify(toolInput.updates) });
      return { success: true, job: data[0] };
    }
    case 'insert_candidate': {
      var row = { name: toolInput.name, created_by: currentUser ? currentUser.id : null };
      if (toolInput.profile_link) row.profile_link = toolInput.profile_link;
      if (toolInput.location) row.location = toolInput.location;
      if (toolInput.rate) row.rate = toolInput.rate;
      if (toolInput.pst_overlap) row.pst_overlap = toolInput.pst_overlap;
      if (toolInput.availability) row.availability = toolInput.availability;
      if (toolInput.notes) row.notes = toolInput.notes;
      if (toolInput.avatar_url) row.avatar_url = toolInput.avatar_url;
      var { data, error } = await sb.from('candidates').insert(row).select();
      if (error) return { error: error.message };
      await logActivity('candidate', data[0].id, 'insert', { note: toolInput.name });
      return { success: true, candidate: data[0] };
    }
    case 'update_candidate': {
      var candId = toolInput.candidate_id;
      if (!candId && toolInput.candidate_name) {
        var { data: matches, error: findErr } = await sb.from('candidates').select('id, name')
          .ilike('name', '%' + toolInput.candidate_name + '%').limit(1);
        if (findErr) return { error: findErr.message };
        if (!matches || matches.length === 0) return { error: 'No candidate found matching "' + toolInput.candidate_name + '"' };
        candId = matches[0].id;
      }
      if (!candId) return { error: 'Provide candidate_id or candidate_name' };
      var updates = toolInput.updates || {};
      updates.updated_by = currentUser ? currentUser.id : null;
      var { data, error } = await sb.from('candidates').update(updates).eq('id', candId).select();
      if (error) return { error: error.message };
      await logActivity('candidate', candId, 'update', { new_value: JSON.stringify(updates) });
      return { success: true, candidate: data[0] };
    }
    case 'assign_candidate_to_job': {
      var row = {
        job_id: toolInput.job_id,
        candidate_id: toolInput.candidate_id,
        status: toolInput.status || 'TALENT INTRODUCED',
        date_introduced: new Date().toISOString().split('T')[0],
        updated_by: currentUser ? currentUser.id : null
      };
      var { data, error } = await sb.from('job_candidates').insert(row).select();
      if (error) return { error: error.message };
      await logActivity('job_candidate', data[0].id, 'assign', { new_value: row.status });
      return { success: true, record: data[0] };
    }
    case 'update_candidate_status': {
      // Find the job_candidates record by candidate name
      var query = sb.from('job_candidates').select('*, candidates(name)');
      if (toolInput.job_id) query = query.eq('job_id', toolInput.job_id);
      var { data: records, error: findErr } = await query;
      if (findErr) return { error: findErr.message };
      var match = records.find(function(r) {
        return r.candidates && r.candidates.name &&
          r.candidates.name.toLowerCase().includes(toolInput.candidate_name.toLowerCase());
      });
      if (!match) return { error: 'No candidate found matching "' + toolInput.candidate_name + '"' };
      var oldStatus = match.status;
      var { data, error } = await sb.from('job_candidates')
        .update({ status: toolInput.new_status, updated_at: new Date().toISOString(), updated_by: currentUser ? currentUser.id : null })
        .eq('id', match.id).select();
      if (error) return { error: error.message };
      await logActivity('job_candidate', match.id, 'status_change', { old_value: oldStatus, new_value: toolInput.new_status, note: match.candidates.name });
      return { success: true, updated: data[0], candidate_name: match.candidates.name };
    }
    case 'update_job_candidate_fields': {
      var jcId = toolInput.job_candidates_id;
      if (!jcId && toolInput.candidate_name) {
        var query = sb.from('job_candidates').select('id, candidates(name)');
        if (toolInput.job_id) query = query.eq('job_id', toolInput.job_id);
        var { data: recs } = await query;
        var m = (recs || []).find(function(r) {
          return r.candidates && r.candidates.name &&
            r.candidates.name.toLowerCase().includes(toolInput.candidate_name.toLowerCase());
        });
        if (m) jcId = m.id;
      }
      if (!jcId) return { error: 'Could not find job_candidates record' };
      toolInput.updates.updated_at = new Date().toISOString();
      toolInput.updates.updated_by = currentUser ? currentUser.id : null;
      var { data, error } = await sb.from('job_candidates')
        .update(toolInput.updates).eq('id', jcId).select();
      if (error) return { error: error.message };
      await logActivity('job_candidate', jcId, 'update', { new_value: JSON.stringify(toolInput.updates) });
      return { success: true, updated: data[0] };
    }
    case 'delete_job': {
      // Delete associated job_candidates first
      await sb.from('job_candidates').delete().eq('job_id', toolInput.job_id);
      var { error } = await sb.from('jobs').delete().eq('id', toolInput.job_id);
      if (error) return { error: error.message };
      await logActivity('job', toolInput.job_id, 'delete');
      return { success: true, deleted_job_id: toolInput.job_id };
    }
    case 'query_database': {
      var query = sb.from(toolInput.table).select(toolInput.select || '*');
      if (toolInput.filters) {
        toolInput.filters.forEach(function(f) {
          if (f.op === 'like' || f.op === 'ilike') query = query[f.op](f.column, f.value);
          else query = query.filter(f.column, f.op, f.value);
        });
      }
      query = query.limit(toolInput.limit || 50);
      var { data, error } = await query;
      if (error) return { error: error.message };
      return { results: data, count: data.length };
    }
    default:
      return { error: 'Unknown tool: ' + toolName };
  }
}

async function submitJobForm() {
  // Read values
  var buSelect = (document.getElementById('jf-bu') || {}).value || '';
  var buNew = (document.getElementById('jf-bu-new') || {}).value || '';
  var bu = buSelect === '__new__' ? buNew.trim() : buSelect;
  var poc = (document.getElementById('jf-poc') || {}).value || '';
  var projectSelect = (document.getElementById('jf-project') || {}).value || '';
  var projectNew = (document.getElementById('jf-project-new') || {}).value || '';
  var role = (document.getElementById('jf-role') || {}).value || '';
  var openingsVal = parseInt((document.getElementById('jf-openings') || {}).value, 10) || 1;
  var sow = (document.getElementById('jf-sow') || {}).value || '';
  var sfdc = (document.getElementById('jf-sfdc') || {}).value || '';
  var platform = (document.getElementById('jf-platform') || {}).value || '';

  var projectName = projectSelect === '__new__' ? projectNew.trim() : projectSelect;

  // Validate required fields
  var valid = true;
  [['jf-poc', poc], ['jf-role', role]].forEach(function(pair) {
    var el = document.getElementById(pair[0]);
    if (el) { if (!pair[1].trim()) { el.classList.add('error'); valid = false; } else { el.classList.remove('error'); } }
  });
  // BU validation
  var buEl = document.getElementById('jf-bu');
  var buNewEl = document.getElementById('jf-bu-new');
  if (!bu) {
    if (buEl) buEl.classList.add('error');
    if (buSelect === '__new__' && buNewEl) buNewEl.classList.add('error');
    valid = false;
  } else {
    if (buEl) buEl.classList.remove('error');
    if (buNewEl) buNewEl.classList.remove('error');
  }
  // Project validation
  var projEl = document.getElementById('jf-project');
  var projNewEl = document.getElementById('jf-project-new');
  if (!projectName) {
    if (projEl) projEl.classList.add('error');
    if (projectSelect === '__new__' && projNewEl) projNewEl.classList.add('error');
    valid = false;
  } else {
    if (projEl) projEl.classList.remove('error');
    if (projNewEl) projNewEl.classList.remove('error');
  }

  if (!valid) return;

  // Build row
  var row = {
    bu: bu.trim(),
    project_name: projectName,
    role_title: role.trim(),
    poc_names: poc.trim(),
    openings: openingsVal,
    created_by: currentUser ? currentUser.id : null
  };
  if (sow.trim()) row.sow_number = sow.trim();
  if (sfdc.trim()) row.salesforce_link = sfdc.trim();
  if (platform.trim()) row.toptal_job_link = platform.trim();

  // Insert
  try {
    var { data, error } = await sb.from('jobs').insert(row).select();
    // If sow_number column doesn't exist yet, retry without it
    if (error && error.message && error.message.indexOf('sow_number') !== -1) {
      var savedSow = row.sow_number;
      delete row.sow_number;
      var retry = await sb.from('jobs').insert(row).select();
      data = retry.data; error = retry.error;
      if (!error) {
        chatMessages.push({ role: 'system', content: '\u26A0\uFE0F SOW field was not saved — the sow_number column needs to be added to the jobs table in Supabase.' });
      }
    }
    if (error) {
      chatMessages.push({ role: 'assistant', content: '\u274C Error creating job: ' + error.message });
      renderChat();
      return;
    }

    await logActivity('job', data[0].id, 'insert', { note: row.role_title + ' (' + row.bu + ')' });

    // Replace form card with confirmation
    for (var i = chatMessages.length - 1; i >= 0; i--) {
      if (chatMessages[i]._isForm) {
        chatMessages[i] = {
          role: 'action_card',
          content: '<div class="chat-action-card"><h4>\u2705 Job Created</h4><p><strong>' + escHTML(row.role_title) + '</strong> (' + openingsVal + ' opening' + (openingsVal > 1 ? 's' : '') + ') added to ' + escHTML(row.bu) + ' / ' + escHTML(row.project_name) + (sow.trim() ? ' — SOW: ' + escHTML(sow.trim()) : '') + '</p></div>'
        };
        break;
      }
    }

    chatMessages.push({ role: 'assistant', content: '\u2705 **' + escHTML(row.role_title) + '** has been added to **' + escHTML(row.bu) + ' / ' + escHTML(row.project_name) + '**. It\u2019s now showing in Open Jobs.' + (row.salesforce_link ? ' SFDC link saved.' : '') + (row.toptal_job_link ? ' Platform link saved.' : '') });

    // Refresh data so new job appears in dashboard
    await refreshData();
    renderChat();
  } catch(e) {
    chatMessages.push({ role: 'assistant', content: '\u274C Error: ' + e.message });
    renderChat();
  }
}

    var jobId = jobSelect;
    var jobLabel = '';

    // Step 1: Create new job if needed
    if (isNewJob) {
      var jobRow = {
        bu: jobBU, project_name: jobProject, role_title: jobRole.trim(),
        openings: 1, created_by: currentUser ? currentUser.id : null
      };
      var { data: jobData, error: jobErr } = await sb.from('jobs').insert(jobRow).select();
      if (jobErr) {
        chatMessages.push({ role: 'assistant', content: '\u274C Error creating job: ' + jobErr.message });
        renderChat();
        return;
      }
      jobId = jobData[0].id;
      jobLabel = jobRole.trim() + ' \u2014 ' + jobProject + ' (' + jobBU + ')';
      await logActivity('job', jobId, 'insert', { note: jobRow.role_title + ' (' + jobRow.bu + ')' });
    } else {
      // Find label for existing job
      if (FULFILLMENT_DATA) {
        var match = FULFILLMENT_DATA.find(function(j) { return j.id === jobId; });
        if (match) jobLabel = match.role_title + ' \u2014 ' + match.project_name + ' (' + match.bu + ')';
      }
    }

    // Step 2: Insert candidate
    var candRow = { name: name.trim(), created_by: currentUser ? currentUser.id : null };
    if (profileLink.trim()) candRow.profile_link = profileLink.trim();
    if (location.trim()) candRow.location = location.trim();
    if (rateStr) candRow.rate = parseFloat(rateStr);
    if (availability.trim()) candRow.availability = availability.trim();
    if (notes.trim()) candRow.notes = notes.trim();

    var { data: candData, error: candErr } = await sb.from('candidates').insert(candRow).select();
    if (candErr) {
      chatMessages.push({ role: 'assistant', content: '\u274C Error adding candidate: ' + candErr.message });
      renderChat();
      return;
    }
    var candidateId = candData[0].id;
    await logActivity('candidate', candidateId, 'insert', { note: name.trim() });

    // Step 3: Assign candidate to job
    var assignRow = {
      job_id: jobId,
      candidate_id: candidateId,
      status: 'TALENT INTRODUCED',
      date_introduced: new Date().toISOString().split('T')[0],
      updated_by: currentUser ? currentUser.id : null
    };
    var { data: assignData, error: assignErr } = await sb.from('job_candidates').insert(assignRow).select();
    if (assignErr) {
      chatMessages.push({ role: 'assistant', content: '\u274C Candidate created but assignment failed: ' + assignErr.message });
      renderChat();
      return;
    }
    await logActivity('job_candidate', assignData[0].id, 'assign', { new_value: 'TALENT INTRODUCED' });

    // Replace form with confirmation
    for (var i = chatMessages.length - 1; i >= 0; i--) {
      if (chatMessages[i]._isForm) {
        chatMessages[i] = {
          role: 'action_card',
          content: '<div class="chat-action-card"><h4>\u2705 Candidate Added</h4><p><strong>' + escHTML(name.trim()) + '</strong> assigned to ' + escHTML(jobLabel) + ' as Talent Introduced</p></div>'
        };
        break;
      }
    }

    var msg = '\u2705 **' + escHTML(name.trim()) + '** has been added';
    if (isNewJob) msg += ' and a new job **' + escHTML(jobRole.trim()) + '** was created';
    msg += '. Assigned to **' + escHTML(jobLabel) + '** with status Talent Introduced.';
    chatMessages.push({ role: 'assistant', content: msg });

    await refreshData();
    renderChat();
  } catch(e) {
    chatMessages.push({ role: 'assistant', content: '\u274C Error: ' + e.message });
    renderChat();
  }
}

function cancelCandidateForm() {
  for (var i = chatMessages.length - 1; i >= 0; i--) {
    if (chatMessages[i]._isForm) {
      chatMessages[i] = {
        role: 'action_card',
        content: '<div class="chat-action-card" style="opacity:0.6;"><p>Candidate creation cancelled.</p></div>'
      };
      break;
    }
  }
  renderChat();
}

function renderChat() {
  var container = document.getElementById('chatMessages');
  var html = '';
  chatMessages.forEach(function(msg, idx) {
    if (msg.role === 'action_card') {
      html += msg.content; // Pre-built HTML
    } else {
      // Support basic markdown in assistant messages
      var text = escHTML(msg.content);
      if (msg.role === 'assistant') {
        text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        text = text.replace(/\n/g, '<br>');
      }
      html += '<div class="chat-msg ' + msg.role + '">' + text + '</div>';
    }
  });
  container.innerHTML = html;
  container.scrollTop = container.scrollHeight;
}

function showTyping() {
  var container = document.getElementById('chatMessages');
  container.innerHTML += '<div class="chat-msg assistant" id="typingMsg"><div class="typing-indicator"><span></span><span></span><span></span></div></div>';
  container.scrollTop = container.scrollHeight;
}

function removeTyping() {
  var el = document.getElementById('typingMsg');
  if (el) el.remove();
}

async function sendChat() {
  var input = document.getElementById('chatInput');
  var text = input.value.trim();
  if (!text) return;
  input.value = '';

  // Intent detection: show forms instead of calling Claude
  var lowerText = text.toLowerCase();
  if (/\b(add|create|new)\b.*\b(candidate|person|talent|developer|engineer)\b/.test(lowerText) && !/\b(to|for|status)\b.*\b(job|role)\b/.test(lowerText)) {
    chatMessages.push({ role: 'user', content: text });
    renderChat();
    showCandidateForm();
    return;
  }
  if (/\b(add|create|new|open)\b.*\b(job|role|req|position)\b/.test(lowerText) && !/\b(candidate|person|developer|engineer)\b.*\b(to|for)\b/.test(lowerText)) {
    chatMessages.push({ role: 'user', content: text });
    renderChat();
    showJobForm();
    return;
  }

  chatMessages.push({ role: 'user', content: text });
  renderChat();
  showTyping();

  await callClaude();
}

// Build the system prompt for Claude — called fresh each time to get latest context
function buildSystemPrompt() {
  var context = buildChatContext();
  return 'You are an expert AI recruiting coordinator embedded in a talent pipeline dashboard for Yahoo\'s Toptal staffing program. You have FULL read/write access to the live database via tools.\n\n' +

    '## YOUR EXPERTISE\n' +
    'You deeply understand recruiting operations, talent pipelines, and staffing workflows. You manage:\n' +
    '- Open roles across Yahoo BUs: Mail, Sports, Home Eco, Paranoids, Search, Ads, Platform, etc.\n' +
    '- Candidate lifecycle: submission → introduction → interview → decision → hire/reject\n' +
    '- Pipeline analytics, fulfillment tracking, and team coordination\n\n' +

    '## LIVE DATABASE STATE\n' + context + '\n\n' +

    '## INTELLIGENCE & REASONING\n\n' +

    '### You are smart. Act like it.\n' +
    '- Infer intent from partial information. If someone says "add Narcis for the test engineer role", you know they want to insert a candidate AND assign them to that job.\n' +
    '- Extract ALL data from the user\'s message. If they include a name, URL, rate, and role in one sentence, capture every field — don\'t ask for info they already gave you.\n' +
    '- Parse natural language fluently: "$50/hour" → rate: 50. "Toptal profile: [URL]" → profile_link. "RTT" or "rate" = hourly rate.\n' +
    '- Resolve references from context: "the Mail role", "that Sports project", "the React Dev position" → match against live data above.\n' +
    '- If a candidate name partially matches someone already in the system, ask if it\'s the same person before creating a duplicate.\n\n' +

    '### When you have enough info → EXECUTE IMMEDIATELY\n' +
    'Don\'t narrate what you\'d do. Just do it with tools, then confirm briefly what happened.\n' +
    'Multi-step operations should be done in sequence. "Submit John for the Mail role" → insert_candidate, then query to get IDs, then assign_candidate_to_job.\n\n' +

    '### When info is genuinely missing → ASK SPECIFIC QUESTIONS\n' +
    'Only ask about what you truly cannot infer. Be specific:\n' +
    '- DON\'T: "Can you provide more details?"\n' +
    '- DO: "Which role should I assign them to? I see these open positions: [list specific matching roles]"\n' +
    '- DON\'T: "What information do you have about the candidate?"\n' +
    '- DO: "Got it — adding Narcis. Do you know their location and PST overlap hours?"\n\n' +

    '### Smart matching & resolution:\n' +
    '- Fuzzy-match names: "Narcis" matches "Narcis Gabriel Gemene"\n' +
    '- Resolve project references: "the test engineer role" → find jobs with role_title containing "test engineer"\n' +
    '- If only ONE job matches a description, use it without asking\n' +
    '- If multiple jobs match, show the options and ask which one\n' +
    '- Use query_database to look up candidate IDs, job IDs, or any data not in the snapshot above\n\n' +

    '## TOOL EXECUTION RULES\n' +
    '- ALWAYS use tools for database operations. Never describe what you would do — just do it.\n' +
    '- For multi-step operations (e.g. add candidate + assign to job), execute ALL steps.\n' +
    '- Use EXACT status strings: ' + VALID_DB_STATUSES.join(', ') + '\n' +
    '- Toptal URLs go in profile_link. Photo/avatar URLs go in avatar_url.\n' +
    '- After writes, confirm concisely: "✅ Added Narcis ($50/hr) to Test Engineer role and set status to TALENT INTRODUCED."\n' +
    '- Use query_database when you need IDs or data not in the context snapshot\n\n' +

    '## PERSONALITY\n' +
    '- Sharp, efficient, proactive — like the best recruiting coordinator on the team\n' +
    '- Concise responses. No fluff. Use bullet points and tables for data.\n' +
    '- Proactively flag useful info: "FYI, that role already has 3 candidates in interview stage."\n' +
    '- If something looks off (stale candidates, unfilled roles), mention it when relevant';
}

// Build API messages from chatMessages — handles tool_use/tool_result pairing correctly
function buildApiMessages() {
  var messages = [];
  var i = 0;
  while (i < chatMessages.length) {
    var m = chatMessages[i];

    if (m.role === 'user') {
      messages.push({ role: 'user', content: m.content });
      i++;
    } else if (m.role === 'assistant') {
      // Use raw content (with tool_use blocks) if available, otherwise plain text
      var content = m._raw || m.content;
      messages.push({ role: 'assistant', content: content });
      i++;

      // If this assistant message had tool_use blocks, collect ALL following tool_results
      var hasToolUse = Array.isArray(content) && content.some(function(b) { return b.type === 'tool_use'; });
      if (hasToolUse) {
        var results = [];
        // Scan forward, skipping action_cards and collecting tool_results
        while (i < chatMessages.length) {
          var next = chatMessages[i];
          if (next.role === 'tool_result') {
            results.push({ type: 'tool_result', tool_use_id: next.tool_use_id, content: next.content });
            i++;
          } else if (next.role === 'action_card' || next.role === 'system') {
            i++; // skip display-only messages
          } else {
            break; // hit user or assistant — stop collecting
          }
        }
        if (results.length > 0) {
          messages.push({ role: 'user', content: results });
        }
      }
    } else {
      // Skip system, action_card, and any other non-API roles
      i++;
    }
  }
  return messages;
}

// Main Claude API call — handles tool execution loops
async function callClaude() {
  var systemPrompt = buildSystemPrompt();
  var maxToolRounds = 5; // Safety limit on consecutive tool-call rounds

  for (var round = 0; round < maxToolRounds; round++) {
    var apiMessages = buildApiMessages();

    try {
      var token = await getAccessToken();
      var response = await fetch('/api/claude', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + token
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 4096,
          system: systemPrompt,
          tools: CHAT_TOOLS,
          messages: apiMessages
        })
      });

      var data = await response.json();
      removeTyping();

      if (data.error) {
        chatMessages.push({ role: 'assistant', content: 'Error: ' + (data.error.message || JSON.stringify(data.error)) });
        renderChat();
        return;
      }

      // Parse response content blocks
      var textParts = [];
      var toolCalls = [];
      (data.content || []).forEach(function(block) {
        if (block.type === 'text' && block.text) textParts.push(block.text);
        else if (block.type === 'tool_use') toolCalls.push(block);
      });

      var hasToolUse = toolCalls.length > 0;

      if (!hasToolUse) {
        // Pure text response — add and we're done
        if (textParts.length > 0) {
          chatMessages.push({ role: 'assistant', content: textParts.join('\n') });
        }
        renderChat();
        return; // Exit the loop
      }

      // Has tool calls — store assistant message with raw content for proper API replay
      chatMessages.push({ role: 'assistant', content: textParts.join('\n') || 'Working on it...', _raw: data.content });

      // Execute each tool call
      for (var ti = 0; ti < toolCalls.length; ti++) {
        var tc = toolCalls[ti];
        var actionLabel = describeToolCall(tc.name, tc.input);
        chatMessages.push({
          role: 'action_card',
          content: '<div class="chat-action-card"><h4>\u2699\uFE0F ' + escHTML(actionLabel) + '</h4><p>Executing...</p></div>'
        });
        renderChat();

        var result = await executeTool(tc.name, tc.input);

        // Update action card with result
        var statusMsg = result.error ? '\u274C Error: ' + escHTML(result.error) : '\u2705 Done';
        chatMessages[chatMessages.length - 1].content =
          '<div class="chat-action-card"><h4>\u2699\uFE0F ' + escHTML(actionLabel) + '</h4><p>' + statusMsg + '</p></div>';

        // Store tool result for API conversation
        chatMessages.push({
          role: 'tool_result',
          tool_use_id: tc.id,
          content: JSON.stringify(result)
        });
      }

      // Refresh dashboard after writes
      await refreshData();
      renderChat();
      showTyping();
      // Loop continues — next iteration calls Claude with tool results so it can summarize or make more calls

    } catch(err) {
      removeTyping();
      chatMessages.push({ role: 'assistant', content: 'Connection error: ' + err.message });
      renderChat();
      return;
    }
  }

  // Hit max rounds — force stop
  removeTyping();
  chatMessages.push({ role: 'assistant', content: 'Completed all operations.' });
  renderChat();
}

function describeToolCall(name, input) {
  switch(name) {
    case 'insert_job': return 'Adding job: ' + input.role_title + ' (' + input.bu + ' / ' + input.project_name + ')';
    case 'update_job': return 'Updating job ' + (input.job_id || '').substring(0, 8) + '...';
    case 'insert_candidate': return 'Adding candidate: ' + input.name;
    case 'update_candidate': return 'Updating candidate: ' + (input.candidate_name || input.candidate_id || '');
    case 'assign_candidate_to_job': return 'Assigning candidate to job';
    case 'update_candidate_status': return 'Updating ' + input.candidate_name + ' \u2192 ' + input.new_status;
    case 'update_job_candidate_fields': return 'Updating candidate record fields';
    case 'delete_job': return 'Deleting job ' + (input.job_id || '').substring(0, 8) + '...';
    case 'query_database': return 'Querying ' + input.table;
    default: return name;
  }
}
