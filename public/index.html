async function submitJobForm() {
  // Read values
  var buSelect = (document.getElementById('jf-bu') || {}).value || '';
  var buNew = (document.getElementById('jf-bu-new') || {}).value || '';
  var bu = buSelect === '__new__' ? buNew.trim() : buSelect;
  var poc = (document.getElementById('jf-poc') || {}).value || '';
  var projectSelect = (document.getElementById('jf-project') || {}).value || '';
  var projectNew = (document.getElementById('jf-project-new') || {}).value || '';
  var role = (document.getElementById('jf-role') || {}).value || '';
  var openingsVal = parseInt((document.getElementById('jf-openings') || {}).value, 10) || 1;
  var sow = (document.getElementById('jf-sow') || {}).value || '';
  var sfdc = (document.getElementById('jf-sfdc') || {}).value || '';
  var platform = (document.getElementById('jf-platform') || {}).value || '';

  var projectName = projectSelect === '__new__' ? projectNew.trim() : projectSelect;

  // Validate required fields
  var valid = true;
  [['jf-poc', poc], ['jf-role', role]].forEach(function(pair) {
    var el = document.getElementById(pair[0]);
    if (el) { if (!pair[1].trim()) { el.classList.add('error'); valid = false; } else { el.classList.remove('error'); } }
  });
  // BU validation
  var buEl = document.getElementById('jf-bu');
  var buNewEl = document.getElementById('jf-bu-new');
  if (!bu) {
    if (buEl) buEl.classList.add('error');
    if (buSelect === '__new__' && buNewEl) buNewEl.classList.add('error');
    valid = false;
  } else {
    if (buEl) buEl.classList.remove('error');
    if (buNewEl) buNewEl.classList.remove('error');
  }
  // Project validation
  var projEl = document.getElementById('jf-project');
  var projNewEl = document.getElementById('jf-project-new');
  if (!projectName) {
    if (projEl) projEl.classList.add('error');
    if (projectSelect === '__new__' && projNewEl) projNewEl.classList.add('error');
    valid = false;
  } else {
    if (projEl) projEl.classList.remove('error');
    if (projNewEl) projNewEl.classList.remove('error');
  }

  if (!valid) return;

  // Build row
  var row = {
    bu: bu.trim(),
    project_name: projectName,
    role_title: role.trim(),
    poc_names: poc.trim(),
    openings: openingsVal,
    created_by: currentUser ? currentUser.id : null
  };
  if (sow.trim()) row.sow_number = sow.trim();
  if (sfdc.trim()) row.salesforce_link = sfdc.trim();
  if (platform.trim()) row.toptal_job_link = platform.trim();

  // Insert
  try {
    var { data, error } = await sb.from('jobs').insert(row).select();
    // If sow_number column doesn't exist yet, retry without it
    if (error && error.message && error.message.indexOf('sow_number') !== -1) {
      var savedSow = row.sow_number;
      delete row.sow_number;
      var retry = await sb.from('jobs').insert(row).select();
      data = retry.data; error = retry.error;
      if (!error) {
        chatMessages.push({ role: 'system', content: '\u26A0\uFE0F SOW field was not saved — the sow_number column needs to be added to the jobs table in Supabase.' });
      }
    }
    if (error) {
      chatMessages.push({ role: 'assistant', content: '\u274C Error creating job: ' + error.message });
      renderChat();
      return;
    }

    await logActivity('job', data[0].id, 'insert', { note: row.role_title + ' (' + row.bu + ')' });

    // Replace form card with confirmation
    for (var i = chatMessages.length - 1; i >= 0; i--) {
      if (chatMessages[i]._isForm) {
        chatMessages[i] = {
          role: 'action_card',
          content: '<div class="chat-action-card"><h4>\u2705 Job Created</h4><p><strong>' + escHTML(row.role_title) + '</strong> (' + openingsVal + ' opening' + (openingsVal > 1 ? 's' : '') + ') added to ' + escHTML(row.bu) + ' / ' + escHTML(row.project_name) + (sow.trim() ? ' — SOW: ' + escHTML(sow.trim()) : '') + '</p></div>'
        };
        break;
      }
    }

    chatMessages.push({ role: 'assistant', content: '\u2705 **' + escHTML(row.role_title) + '** has been added to **' + escHTML(row.bu) + ' / ' + escHTML(row.project_name) + '**. It\u2019s now showing in Open Jobs.' + (row.salesforce_link ? ' SFDC link saved.' : '') + (row.toptal_job_link ? ' Platform link saved.' : '') });

    // Refresh data so new job appears in dashboard
    await refreshData();
    renderChat();
  } catch(e) {
    chatMessages.push({ role: 'assistant', content: '\u274C Error: ' + e.message });
    renderChat();
  }
}

  var location = (document.getElementById('cf-location') || {}).value || '';
  var rateStr = (document.getElementById('cf-rate') || {}).value || '';
  var availability = (document.getElementById('cf-availability') || {}).value || '';
  var notes = (document.getElementById('cf-notes') || {}).value || '';

  // New job fields
  var jobBUSelect = (document.getElementById('cf-job-bu') || {}).value || '';
  var jobBUNew = (document.getElementById('cf-job-bu-new') || {}).value || '';
  var jobBU = jobBUSelect === '__new__' ? jobBUNew.trim() : jobBUSelect;
  var jobProjSelect = (document.getElementById('cf-job-project') || {}).value || '';
  var jobProjNew = (document.getElementById('cf-job-project-new') || {}).value || '';
  var jobProject = jobProjSelect === '__new__' ? jobProjNew.trim() : jobProjSelect;
  var jobRole = (document.getElementById('cf-job-role') || {}).value || '';

  var isNewJob = jobSelect === '__new__';

  // Validate
  var valid = true;
  // Name required
  var nameEl = document.getElementById('cf-name');
  if (!name.trim()) { if (nameEl) nameEl.classList.add('error'); valid = false; } else { if (nameEl) nameEl.classList.remove('error'); }

  // Job required
  var jobEl = document.getElementById('cf-job');
  if (!jobSelect) { if (jobEl) jobEl.classList.add('error'); valid = false; } else { if (jobEl) jobEl.classList.remove('error'); }

  // If new job, validate BU, project, role
  if (isNewJob) {
    var buEl = document.getElementById('cf-job-bu');
    var buNewEl = document.getElementById('cf-job-bu-new');
    if (!jobBU) { if (buEl) buEl.classList.add('error'); if (jobBUSelect === '__new__' && buNewEl) buNewEl.classList.add('error'); valid = false; }
    else { if (buEl) buEl.classList.remove('error'); if (buNewEl) buNewEl.classList.remove('error'); }

    var projEl = document.getElementById('cf-job-project');
    var projNewEl = document.getElementById('cf-job-project-new');
    if (!jobProject) { if (projEl) projEl.classList.add('error'); if (jobProjSelect === '__new__' && projNewEl) projNewEl.classList.add('error'); valid = false; }
    else { if (projEl) projEl.classList.remove('error'); if (projNewEl) projNewEl.classList.remove('error'); }

    var roleEl = document.getElementById('cf-job-role');
    if (!jobRole.trim()) { if (roleEl) roleEl.classList.add('error'); valid = false; } else { if (roleEl) roleEl.classList.remove('error'); }
  }

  if (!valid) return;

  try {
    var jobId = jobSelect;
    var jobLabel = '';

    // Step 1: Create new job if needed
    if (isNewJob) {
      var jobRow = {
        bu: jobBU, project_name: jobProject, role_title: jobRole.trim(),
        openings: 1, created_by: currentUser ? currentUser.id : null
      };
      var { data: jobData, error: jobErr } = await sb.from('jobs').insert(jobRow).select();
      if (jobErr) {
        chatMessages.push({ role: 'assistant', content: '\u274C Error creating job: ' + jobErr.message });
        renderChat();
        return;
      }
      jobId = jobData[0].id;
      jobLabel = jobRole.trim() + ' \u2014 ' + jobProject + ' (' + jobBU + ')';
      await logActivity('job', jobId, 'insert', { note: jobRow.role_title + ' (' + jobRow.bu + ')' });
    } else {
      // Find label for existing job
      if (FULFILLMENT_DATA) {
        var match = FULFILLMENT_DATA.find(function(j) { return j.id === jobId; });
        if (match) jobLabel = match.role_title + ' \u2014 ' + match.project_name + ' (' + match.bu + ')';
      }
    }

    // Step 2: Insert candidate
    var candRow = { name: name.trim(), created_by: currentUser ? currentUser.id : null };
    if (profileLink.trim()) candRow.profile_link = profileLink.trim();
    if (location.trim()) candRow.location = location.trim();
    if (rateStr) candRow.rate = parseFloat(rateStr);
    if (availability.trim()) candRow.availability = availability.trim();
    if (notes.trim()) candRow.notes = notes.trim();

    var { data: candData, error: candErr } = await sb.from('candidates').insert(candRow).select();
    if (candErr) {
      chatMessages.push({ role: 'assistant', content: '\u274C Error adding candidate: ' + candErr.message });
      renderChat();
      return;
    }
    var candidateId = candData[0].id;
    await logActivity('candidate', candidateId, 'insert', { note: name.trim() });

    // Step 3: Assign candidate to job
    var assignRow = {
      job_id: jobId,
      candidate_id: candidateId,
      status: 'TALENT INTRODUCED',
      date_introduced: new Date().toISOString().split('T')[0],
      updated_by: currentUser ? currentUser.id : null
    };
    var { data: assignData, error: assignErr } = await sb.from('job_candidates').insert(assignRow).select();
    if (assignErr) {
      chatMessages.push({ role: 'assistant', content: '\u274C Candidate created but assignment failed: ' + assignErr.message });
      renderChat();
      return;
    }
    await logActivity('job_candidate', assignData[0].id, 'assign', { new_value: 'TALENT INTRODUCED' });

    // Replace form with confirmation
    for (var i = chatMessages.length - 1; i >= 0; i--) {
      if (chatMessages[i]._isForm) {
        chatMessages[i] = {
          role: 'action_card',
          content: '<div class="chat-action-card"><h4>\u2705 Candidate Added</h4><p><strong>' + escHTML(name.trim()) + '</strong> assigned to ' + escHTML(jobLabel) + ' as Talent Introduced</p></div>'
        };
        break;
      }
    }

    var msg = '\u2705 **' + escHTML(name.trim()) + '** has been added';
    if (isNewJob) msg += ' and a new job **' + escHTML(jobRole.trim()) + '** was created';
    msg += '. Assigned to **' + escHTML(jobLabel) + '** with status Talent Introduced.';
    chatMessages.push({ role: 'assistant', content: msg });

    await refreshData();
    renderChat();
  } catch(e) {
    chatMessages.push({ role: 'assistant', content: '\u274C Error: ' + e.message });
    renderChat();
  }
}

function renderChat() {
  var container = document.getElementById('chatMessages');
  var html = '';
  chatMessages.forEach(function(msg, idx) {
    // Hide tool_result messages — they're only used for API context
    if (msg.role === 'tool_result') return;
    if (msg.role === 'action_card') {
      html += msg.content; // Pre-built HTML
    } else if (msg.cssClass === 'chat-briefing') {
      html += '<div class="chat-msg ' + msg.cssClass + '">' + msg.content + '</div>';
    } else {
      // Support basic markdown in assistant messages
      var text = escHTML(msg.content);
      if (msg.role === 'assistant') {
        text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        text = text.replace(/\n/g, '<br>');
      }
      html += '<div class="chat-msg ' + msg.role + '">' + text + '</div>';
    }
  });
  container.innerHTML = html;
  container.scrollTop = container.scrollHeight;
}

async function sendChat() {
  var input = document.getElementById('chatInput');
  var text = input.value.trim();
  if (!text) return;
  input.value = '';

  // Detect pasted candidate info (Talent:/Profile:/Location: pattern)
  var candPasteMatch = text.match(/(?:^|\n)\s*Talent\s*:\s*(.+)/im);
  var hasProfileOrLocation = /(?:Profile|Location|Availability|Rate)\s*:/im.test(text);
  if (candPasteMatch && hasProfileOrLocation) {
    // Parse all candidates from the paste (may have multiple)
    var parsedCands = [];
    var blocks = text.split(/(?=\n\s*Talent\s*:)/i);
    blocks.forEach(function(block) {
      var nameM = block.match(/Talent\s*:\s*(.+)/i);
      if (!nameM) return;
      var cand = { name: nameM[1].trim() };
      var profileM = block.match(/Profile\s*:\s*(https?:\/\/\S+)/i);
      var locM = block.match(/Location\s*:\s*(.+)/i);
      var availM = block.match(/Availability\s*:\s*(.+)/i);
      var rateM = block.match(/(?:Rate|RTT)\s*:\s*\$?(\d+)/i);
      if (profileM) cand.profile_link = profileM[1].trim();
      if (locM) cand.location = locM[1].trim();
      if (availM) cand.availability = availM[1].trim();
      if (rateM) cand.rate = parseInt(rateM[1]);
      parsedCands.push(cand);
    });

    if (parsedCands.length > 0) {
      chatMessages.push({ role: 'user', content: text });

      // Build role picker HTML
      var cancelSt = new Set(['ROLE CANCELLED/FILED', 'REQ COMPLETE', 'ENGAGEMENT COMPLETED']);
      var openJobs = (FULFILLMENT_DATA || []).filter(function(j) { return !cancelSt.has(j.status); });
      var byBU = {};
      openJobs.forEach(function(j) {
        var bu = j.bu || 'Unknown';
        if (!byBU[bu]) byBU[bu] = [];
        var unfilled = (j.openings || 1) - (j.hired_count || 0);
        if (unfilled > 0) byBU[bu].push({ id: j.id, role: j.role_title, project: j.project_name, unfilled: unfilled });
      });

      var candNames = parsedCands.map(function(c) { return c.name; }).join(', ');
      var pickerHTML = '<div class="chat-action-card role-picker">';
      pickerHTML += '<div class="role-picker-title">\uD83C\uDFAF Select a role for ' + (parsedCands.length > 1 ? 'these candidates' : 'this candidate') + ':</div>';
      pickerHTML += '<div class="role-picker-cands">';
      parsedCands.forEach(function(c) {
        pickerHTML += '<div><strong>' + escHTML(c.name) + '</strong>';
        if (c.location) pickerHTML += ' \u2022 ' + escHTML(c.location);
        if (c.rate) pickerHTML += ' \u2022 $' + c.rate + '/hr';
        pickerHTML += '</div>';
      });
      pickerHTML += '</div>';

      Object.keys(byBU).sort().forEach(function(bu) {
        var roles = byBU[bu];
        if (roles.length === 0) return;
        pickerHTML += '<div class="role-picker-bu">';
        pickerHTML += '<div class="role-picker-bu-label">' + escHTML(bu) + '</div>';
        pickerHTML += '<div class="role-picker-roles">';
        roles.forEach(function(r) {
          var data = escHTML(JSON.stringify({ jobId: r.id, role: r.role, bu: bu, project: r.project, candidates: parsedCands }));
          pickerHTML += '<button class="role-picker-btn" data-role-pick=\'' + data + '\'>' +
            escHTML(r.role) + '<span class="rp-unfilled">' + escHTML(r.project) + ' \u2022 ' + r.unfilled + ' needed</span></button>';
        });
        pickerHTML += '</div></div>';
      });
      pickerHTML += '</div>';

      chatMessages.push({ role: 'action_card', content: pickerHTML, _isRolePicker: true });
      renderChat();

      // Bind click handlers after render
      setTimeout(function() {
        document.querySelectorAll('[data-role-pick]').forEach(function(btn) {
          btn.addEventListener('click', async function() {
            var pick = JSON.parse(btn.dataset.rolePick);
            // Replace picker with confirmation
            for (var i = chatMessages.length - 1; i >= 0; i--) {
              if (chatMessages[i]._isRolePicker) {
                chatMessages[i] = { role: 'action_card', content: '<div class="chat-action-card"><p>\u2705 Adding ' + pick.candidates.length + ' candidate' + (pick.candidates.length > 1 ? 's' : '') + ' to <strong>' + escHTML(pick.role) + '</strong> (' + escHTML(pick.bu) + ' / ' + escHTML(pick.project) + ')...</p></div>' };
                break;
              }
            }
            renderChat();

            // Send to Claude with explicit instructions
            var candDesc = pick.candidates.map(function(c) {
              var parts = [c.name];
              if (c.profile_link) parts.push('Profile: ' + c.profile_link);
              if (c.location) parts.push('Location: ' + c.location);
              if (c.availability) parts.push('Availability: ' + c.availability);
              if (c.rate) parts.push('Rate: $' + c.rate + '/hr');
              return parts.join(', ');
            }).join('\n');

            chatMessages.push({
              role: 'user',
              content: 'Add ' + (pick.candidates.length > 1 ? 'these candidates' : 'this candidate') + ' to job ID ' + pick.jobId + ' (' + pick.role + '):\n' + candDesc
            });
            renderChat();
            showTyping();
            await callClaude();
          });
        });
      }, 50);
      return;
    }
  }

  // Intent detection: show forms instead of calling Claude
  var lowerText = text.toLowerCase();
  if (/\b(add|create|new)\b.*\b(candidate|person|talent|developer|engineer)\b/.test(lowerText) && !/\b(to|for|status)\b.*\b(job|role)\b/.test(lowerText)) {
    chatMessages.push({ role: 'user', content: text });
    renderChat();
    showCandidateForm();
    return;
  }
  if (/\b(add|create|new|open)\b.*\b(job|role|req|position)\b/.test(lowerText) && !/\b(candidate|person|developer|engineer)\b.*\b(to|for)\b/.test(lowerText)) {
    chatMessages.push({ role: 'user', content: text });
    renderChat();
    showJobForm();
    return;
  }

  chatMessages.push({ role: 'user', content: text });
  renderChat();
  showTyping();

  await callClaude();
}

// Build API messages from chatMessages — handles tool_use/tool_result pairing correctly
// Uses a sliding window to keep token usage low on follow-up messages
function buildApiMessages() {
  var allMessages = [];
  var i = 0;
  while (i < chatMessages.length) {
    var m = chatMessages[i];

    if (m.role === 'user') {
      allMessages.push({ role: 'user', content: m.content });
      i++;
    } else if (m.role === 'assistant') {
      // Use raw content (with tool_use blocks) if available, otherwise plain text
      var content = m._raw || m.content;
      allMessages.push({ role: 'assistant', content: content });
      i++;

      // If this assistant message had tool_use blocks, collect ALL following tool_results
      var hasToolUse = Array.isArray(content) && content.some(function(b) { return b.type === 'tool_use'; });
      if (hasToolUse) {
        var results = [];
        // Scan forward, skipping action_cards and collecting tool_results
        while (i < chatMessages.length) {
          var next = chatMessages[i];
          if (next.role === 'tool_result') {
            results.push({ type: 'tool_result', tool_use_id: next.tool_use_id, content: next.content });
            i++;
          } else if (next.role === 'action_card' || next.role === 'system') {
            i++; // skip display-only messages
          } else {
            break; // hit user or assistant — stop collecting
          }
        }
        if (results.length > 0) {
          allMessages.push({ role: 'user', content: results });
        }
      }
    } else {
      // Skip system, action_card, and any other non-API roles
      i++;
    }
  }

  // Sliding window: keep last 20 API messages to stay under token limits
  // Always ensure the first message is a user message (API requirement)
  var MAX_MESSAGES = 20;
  if (allMessages.length > MAX_MESSAGES) {
    allMessages = allMessages.slice(-MAX_MESSAGES);
    // Ensure first message is user role
    while (allMessages.length > 0 && allMessages[0].role !== 'user') {
      allMessages.shift();
    }
  }
  return allMessages;
}

// Main Claude API call — handles tool execution loops
async function callClaude() {
  var systemPrompt = buildSystemPrompt();
  var maxToolRounds = 5; // Safety limit on consecutive tool-call rounds

  for (var round = 0; round < maxToolRounds; round++) {
    var apiMessages = buildApiMessages();

    try {
      var token = await getAccessToken();
      var response = await fetch('/api/claude', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + token
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1500,
          system: systemPrompt,
          tools: CHAT_TOOLS,
          messages: apiMessages
        })
      });

      var data = await response.json();
      removeTyping();

      if (data.error) {
        chatMessages.push({ role: 'assistant', content: 'Error: ' + (data.error.message || JSON.stringify(data.error)) });
        renderChat();
        return;
      }

      // Parse response content blocks
      var textParts = [];
      var toolCalls = [];
      (data.content || []).forEach(function(block) {
        if (block.type === 'text' && block.text) textParts.push(block.text);
        else if (block.type === 'tool_use') toolCalls.push(block);
      });

      var hasToolUse = toolCalls.length > 0;

      if (!hasToolUse) {
        // Pure text response — add and we're done
        if (textParts.length > 0) {
          chatMessages.push({ role: 'assistant', content: textParts.join('\n') });
        }
        renderChat();
        return; // Exit the loop
      }

      // Has tool calls — store assistant message with raw content for proper API replay
      chatMessages.push({ role: 'assistant', content: textParts.join('\n') || 'Working on it...', _raw: data.content });

      // Execute each tool call
      for (var ti = 0; ti < toolCalls.length; ti++) {
        var tc = toolCalls[ti];
        var actionLabel = describeToolCall(tc.name, tc.input);
        chatMessages.push({
          role: 'action_card',
          content: '<div class="chat-action-card"><h4>\u2699\uFE0F ' + escHTML(actionLabel) + '</h4><p>Executing...</p></div>'
        });
        renderChat();

        var result = await executeTool(tc.name, tc.input);

        // Update action card with result
        var statusMsg = result.error ? '\u274C Error: ' + escHTML(result.error) : '\u2705 Done';
        chatMessages[chatMessages.length - 1].content =
          '<div class="chat-action-card"><h4>\u2699\uFE0F ' + escHTML(actionLabel) + '</h4><p>' + statusMsg + '</p></div>';

        // Store tool result for API conversation
        chatMessages.push({
          role: 'tool_result',
          tool_use_id: tc.id,
          content: JSON.stringify(result)
        });
      }

      // Refresh dashboard after writes
      await refreshData();
      renderChat();
      showTyping();
      // Loop continues — next iteration calls Claude with tool results so it can summarize or make more calls

    } catch(err) {
      removeTyping();
      chatMessages.push({ role: 'assistant', content: 'Connection error: ' + err.message });
      renderChat();
      return;
    }
  }

  // Hit max rounds — force stop
  removeTyping();
  chatMessages.push({ role: 'assistant', content: 'Completed all operations.' });
  renderChat();
}

function describeToolCall(name, input) {
  switch(name) {
    case 'insert_job': return 'Adding job: ' + input.role_title + ' (' + input.bu + ' / ' + input.project_name + ')';
    case 'update_job': return 'Updating job ' + (input.job_id || '').substring(0, 8) + '...';
    case 'insert_candidate': return 'Adding candidate: ' + input.name;
    case 'update_candidate': return 'Updating candidate: ' + (input.candidate_name || input.candidate_id || '');
    case 'assign_candidate_to_job': return 'Assigning candidate to job';
    case 'update_candidate_status': return 'Updating ' + input.candidate_name + ' \u2192 ' + input.new_status;
    case 'update_job_candidate_fields': return 'Updating candidate record fields';
    case 'delete_job': return 'Deleting job ' + (input.job_id || '').substring(0, 8) + '...';
    case 'query_database': return 'Querying ' + input.table;
    default: return name;
  }
}

function parseFuzzyDate(str) {
  if (!str) return null;
  // Handle "12/3 at 2:00 pm EST" - extract date part before "at"
  var datePart = str.split(/\s+at\s+/i)[0].trim();
  // Try parsing as-is first
  var d = new Date(datePart);
  if (!isNaN(d) && d.getFullYear() > 2000) return d;
  // Try adding current year for "M/D" format
  var parts = datePart.match(/^(\d{1,2})\/(\d{1,2})$/);
  if (parts) {
    var now = new Date();
    d = new Date(now.getFullYear(), parseInt(parts[1]) - 1, parseInt(parts[2]));
    // If date is in the future, use last year
    if (d > now) d = new Date(now.getFullYear() - 1, parseInt(parts[1]) - 1, parseInt(parts[2]));
    if (!isNaN(d)) return d;
  }
  // Try "M/D/YY" or "M/D/YYYY"
  var parts2 = datePart.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})$/);
  if (parts2) {
    var yr = parseInt(parts2[3]);
    if (yr < 100) yr += 2000;
    d = new Date(yr, parseInt(parts2[1]) - 1, parseInt(parts2[2]));
    if (!isNaN(d)) return d;
  }
  return null;
}

function parsePOCNames(pocStr) {
  if (!pocStr) return [];
  return pocStr.split(/[\/,]/).map(function(s) { return s.trim(); }).filter(function(s) { return s.length > 0; });

function getAllCandidates(buFilter, projFilter) {
  var cands = [];
  (FULFILLMENT_DATA || []).forEach(function(job) {
    if (buFilter && job.bu !== buFilter) return;
    if (projFilter && job.project_name !== projFilter) return;
    (job.candidates || []).forEach(function(c) {
      cands.push(Object.assign({}, c, { _job: job }));
    });
  });
  return cands;
}

function renderAnalyticsView() {
  var html = '<div style="padding: 20px 0;">';
  // Sub-view pills
  html += '<div class="analytics-pills">';
  ['funnel', 'velocity', 'stakeholders'].forEach(function(v) {
    var label = v.charAt(0).toUpperCase() + v.slice(1);
    html += '<button class="analytics-pill' + (analyticsSubView === v ? ' active' : '') + '" data-an-pill="' + v + '">' + label + '</button>';
  });
  html += '</div>';

  if (analyticsSubView === 'funnel') {
    html += renderFunnelView();
  } else if (analyticsSubView === 'velocity') {
    html += renderVelocityView();
  } else {
    html += renderStakeholdersView();
  }
  html += '</div>';
  return html;
}

function renderFunnelView() {
  // Collect BUs and projects for filters
  var bus = [], projs = [], _bs = {}, _ps = {};
  (FULFILLMENT_DATA || []).forEach(function(j) {
    if (j.bu && !_bs[j.bu]) { _bs[j.bu] = 1; bus.push(j.bu); }
    if (j.project_name && !_ps[j.project_name]) { _ps[j.project_name] = 1; projs.push(j.project_name); }
  });
  bus.sort(); projs.sort();

  var html = '<div class="an-filters">';
  html += '<select class="an-filter-select" id="anFilterBU"><option value="">All Business Units</option>';
  bus.forEach(function(b) { html += '<option value="' + escHTML(b) + '"' + (anFilterBU === b ? ' selected' : '') + '>' + escHTML(b) + '</option>'; });
  html += '</select>';
  html += '<select class="an-filter-select" id="anFilterProject"><option value="">All Projects</option>';
  projs.forEach(function(p) { html += '<option value="' + escHTML(p) + '"' + (anFilterProject === p ? ' selected' : '') + '>' + escHTML(p) + '</option>'; });
  html += '</select></div>';

  var cands = getAllCandidates(anFilterBU, anFilterProject);

  // Count by stage
  var stages = [
    { key: 'introduced', label: 'Introduced', color: '#204ECF' },
    { key: 'interview_scheduled', label: 'Interview Scheduled', color: '#6941C6' },
    { key: 'pending_decision', label: 'Pending Decision', color: '#D97B00' },
    { key: 'hired', label: 'Hired', color: '#0D9E6E' }
  ];
  var lossBuckets = [
    { key: 'rejected', label: 'Rejected', color: '#DC2626' },
    { key: 'withdrawn', label: 'Withdrawn', color: '#9CA3AF' }
  ];

  var counts = {};
  var rejectionReasons = {};
  cands.forEach(function(c) {
    var s = c._status || 'other';
    counts[s] = (counts[s] || 0) + 1;
    if (s === 'rejected' && c.rejection_reason) {
      var reason = c.rejection_reason.trim();
      rejectionReasons[reason] = (rejectionReasons[reason] || 0) + 1;
    }
  });

  // For funnel, count cumulative (everyone who reached that stage or beyond)
  // Actually, count current status — more useful for a snapshot
  var total = cands.length;
  var maxCount = 0;
  stages.concat(lossBuckets).forEach(function(s) { if ((counts[s.key] || 0) > maxCount) maxCount = counts[s.key] || 0; });
  if (maxCount === 0) maxCount = 1;

  html += '<div class="funnel-chart">';
  for (var i = 0; i < stages.length; i++) {
    var s = stages[i];
    var cnt = counts[s.key] || 0;
    var pct = total > 0 ? Math.round(cnt / total * 100) : 0;
    var barW = Math.max(5, Math.round(cnt / maxCount * 100));
    html += '<div class="funnel-row">';
    html += '<div class="funnel-label">' + s.label + '</div>';
    html += '<div class="funnel-bar-wrap"><div class="funnel-bar" style="width:' + barW + '%;background:' + s.color + ';">' + cnt + '</div></div>';
    html += '<div class="funnel-pct">' + pct + '%</div>';
    html += '</div>';
    // Conversion between adjacent stages
    if (i < stages.length - 1) {
      var next = stages[i + 1];
      var nextCnt = counts[next.key] || 0;
      var conv = cnt > 0 ? Math.round(nextCnt / cnt * 100) : 0;
      html += '<div class="funnel-conversion"><span class="funnel-conv-arrow">\u2193</span><span class="funnel-conv-pct">' + conv + '% conversion</span></div>';
    }
  }

  // Separator
  html += '<div class="funnel-separator"></div>';

  // Loss bars
  lossBuckets.forEach(function(s) {
    var cnt = counts[s.key] || 0;
    var pct = total > 0 ? Math.round(cnt / total * 100) : 0;
    var barW = Math.max(5, Math.round(cnt / maxCount * 100));
    html += '<div class="funnel-row">';
    html += '<div class="funnel-label">' + s.label + '</div>';
    html += '<div class="funnel-bar-wrap"><div class="funnel-bar" style="width:' + barW + '%;background:' + s.color + ';">' + cnt + '</div></div>';
    html += '<div class="funnel-pct">' + pct + '%</div>';
    html += '</div>';
  });
  html += '</div>';

  // Loss summary
  html += '<div class="loss-summary"><h4>Loss Breakdown</h4>';
  var lossEntries = [];
  lossBuckets.forEach(function(s) {
    var cnt = counts[s.key] || 0;
    if (cnt > 0) lossEntries.push({ label: s.label, count: cnt, color: s.color });
  });
  // Add other terminal statuses
  ['unavailable', 'removed_location', 'consider_other', 'on_hold'].forEach(function(k) {
    if (counts[k]) {
      lossEntries.push({ label: k.replace(/_/g, ' ').replace(/\b\w/g, function(l) { return l.toUpperCase(); }), count: counts[k], color: '#6B7280' });
    }
  });
  if (lossEntries.length === 0) {
    html += '<div style="font-size:12px;color:var(--text-muted);">No losses recorded.</div>';
  } else {
    lossEntries.forEach(function(e) {
      html += '<div class="loss-row"><div class="loss-dot" style="background:' + e.color + '"></div><span class="loss-count">' + e.count + '</span> ' + escHTML(e.label) + '</div>';
    });
  }
  // Rejection reasons breakdown
  var reasonKeys = Object.keys(rejectionReasons);
  if (reasonKeys.length > 0) {
    html += '<h4 style="margin-top:12px;">Rejection Reasons</h4>';
    reasonKeys.sort(function(a, b) { return rejectionReasons[b] - rejectionReasons[a]; });
    reasonKeys.forEach(function(r) {
      html += '<div class="loss-row"><div class="loss-dot" style="background:#DC2626"></div><span class="loss-count">' + rejectionReasons[r] + '</span> ' + escHTML(r) + '</div>';
    });
  }
  html += '</div>';
  return html;
}

function renderVelocityView() {
  var cands = getAllCandidates('', '');
  var now = new Date();

  // Build 8-week buckets
  var weeks = [];
  for (var w = 7; w >= 0; w--) {
    var weekStart = new Date(now);
    weekStart.setDate(weekStart.getDate() - weekStart.getDay() - w * 7);
    weekStart.setHours(0, 0, 0, 0);
    var weekEnd = new Date(weekStart);
    weekEnd.setDate(weekEnd.getDate() + 7);
    weeks.push({ start: weekStart, end: weekEnd, count: 0 });
  }

  var daysToInterview = [];
  var daysToHire = [];
  var thisWeekCount = 0;
  var lastWeekCount = 0;
  var thisWeekStart = weeks[weeks.length - 1].start;
  var lastWeekStart = weeks.length >= 2 ? weeks[weeks.length - 2].start : thisWeekStart;
  var lastWeekEnd = weeks.length >= 2 ? weeks[weeks.length - 2].end : thisWeekStart;

  cands.forEach(function(c) {
    var introDate = c.date_introduced ? new Date(c.date_introduced) : null;
    if (introDate && !isNaN(introDate)) {
      // Assign to week bucket
      weeks.forEach(function(wk) {
        if (introDate >= wk.start && introDate < wk.end) wk.count++;
      });
      if (introDate >= thisWeekStart) thisWeekCount++;
      if (introDate >= lastWeekStart && introDate < lastWeekEnd) lastWeekCount++;

      // Days intro -> interview
      var interviewDate = parseFuzzyDate(c.date_interview);
      if (interviewDate) {
        var diff = Math.round((interviewDate - introDate) / 86400000);
        if (diff >= 0 && diff < 365) daysToInterview.push(diff);
      }
      // Days intro -> hire
      if (c._status === 'hired' && c.date_hired) {
        var hireDate = new Date(c.date_hired);
        if (!isNaN(hireDate)) {
          var diff2 = Math.round((hireDate - introDate) / 86400000);
          if (diff2 >= 0 && diff2 < 365) daysToHire.push(diff2);
        }
      }
    }
  });

  var avgInterview = daysToInterview.length > 0 ? Math.round(daysToInterview.reduce(function(a, b) { return a + b; }, 0) / daysToInterview.length) : null;
  var avgHire = daysToHire.length > 0 ? Math.round(daysToHire.reduce(function(a, b) { return a + b; }, 0) / daysToHire.length) : null;

  var html = '<div class="vel-kpis">';
  html += '<div class="vel-kpi"><div class="vel-kpi-val">' + (avgInterview !== null ? avgInterview + 'd' : '\u2014') + '</div><div class="vel-kpi-label">Avg Days to Interview</div></div>';
  html += '<div class="vel-kpi"><div class="vel-kpi-val">' + (avgHire !== null ? avgHire + 'd' : '\u2014') + '</div><div class="vel-kpi-label">Avg Days to Hire</div></div>';
  html += '<div class="vel-kpi"><div class="vel-kpi-val">' + thisWeekCount + '</div><div class="vel-kpi-label">Submissions This Week</div></div>';
  html += '<div class="vel-kpi"><div class="vel-kpi-val">' + lastWeekCount + '</div><div class="vel-kpi-label">Submissions Last Week</div></div>';
  html += '</div>';

  // Weekly bar chart
  var maxW = 1;
  weeks.forEach(function(wk) { if (wk.count > maxW) maxW = wk.count; });

  html += '<div class="vel-chart">';
  weeks.forEach(function(wk) {
    var label = (wk.start.getMonth() + 1) + '/' + wk.start.getDate();
    var barW = Math.max(3, Math.round(wk.count / maxW * 100));
    html += '<div class="vel-row"><div class="vel-week">Week of ' + label + '</div>';
    html += '<div class="vel-bar-wrap"><div class="vel-bar" style="width:' + barW + '%;">' + wk.count + '</div></div></div>';
  });
  html += '</div>';
  return html;
}

function renderStakeholdersView() {
  // Parse all unique POC names
  var pocMap = {}; // pocName -> { roles: [], totalOpenings, activeCandidates, hires, agingDays[] }
  (FULFILLMENT_DATA || []).forEach(function(job) {
    var names = parsePOCNames(job.poc_names);
    names.forEach(function(name) {
      if (!pocMap[name]) pocMap[name] = { name: name, roles: [], totalOpenings: 0, activeCandidates: 0, hires: 0, agingDays: [] };
      var poc = pocMap[name];
      poc.roles.push(job);
      poc.totalOpenings += (job.openings || 1);
      poc.hires += (job.hired_count || 0);
      poc.activeCandidates += (job.active_candidates || 0);
      if (job.days_since_contact != null) poc.agingDays.push(job.days_since_contact);
    });
  });

  // Sort by "most roles at risk" — count roles with health score < 40
  var pocList = Object.values(pocMap);
  pocList.forEach(function(poc) {
    poc.atRiskCount = poc.roles.filter(function(j) { return (j._healthScore || 0) < 40; }).length;
    poc.avgAging = poc.agingDays.length > 0 ? Math.round(poc.agingDays.reduce(function(a, b) { return a + b; }, 0) / poc.agingDays.length) : null;
  });
  pocList.sort(function(a, b) { return b.atRiskCount - a.atRiskCount || b.roles.length - a.roles.length; });

  var html = '<div class="sth-grid">';
  if (pocList.length === 0) {
    html += '<div style="padding:20px;color:var(--text-muted);font-size:14px;">No POC data available.</div>';
  }
  pocList.forEach(function(poc, idx) {
    var agingBand = computeAgingBand(poc.avgAging);
    html += '<div class="sth-card">';
    html += '<div class="sth-card-header">';
    html += '<div class="sth-avatar" style="background:' + hashColor(poc.name) + ';">' + initials(poc.name) + '</div>';
    html += '<div><div class="sth-name">' + escHTML(poc.name) + '</div></div>';
    html += '</div>';
    html += '<div class="sth-stats">';
    html += '<div class="sth-stat"><b>' + poc.roles.length + '</b> roles</div>';
    html += '<div class="sth-stat"><b>' + poc.totalOpenings + '</b> openings</div>';
    html += '<div class="sth-stat"><b>' + poc.activeCandidates + '</b> active</div>';
    html += '<div class="sth-stat"><b>' + poc.hires + '</b> hires</div>';
    html += '<div class="sth-stat">Avg contact: <span style="color:' + agingBand.color + ';font-weight:700;">' + agingBand.label + '</span></div>';
    html += '</div>';
    // Mini role list
    html += '<div class="sth-roles">';
    poc.roles.forEach(function(j) {
      html += '<div class="sth-role-row"><span class="sth-role-title">' + escHTML(j.role_title) + '</span>' + generateHealthBadge(j._healthScore || 0) + '</div>';
    });
    html += '</div>';
    // Prepare Brief button
    html += '<button class="sth-brief-btn" data-sth-brief="' + idx + '">Prepare Brief</button>';
    html += '<div id="sthBrief' + idx + '" style="display:none;"></div>';
    html += '</div>';
  });
  html += '</div>';

  // Store pocList globally for brief generation
  window._sthPocList = pocList;
  return html;
}

function generatePOCBrief(poc) {
  var lines = [];
  lines.push('STAKEHOLDER BRIEF: ' + poc.name);
  lines.push('Generated: ' + new Date().toLocaleDateString());
  lines.push('');
  lines.push('SUMMARY');
  lines.push('  Roles owned: ' + poc.roles.length);
  lines.push('  Total openings: ' + poc.totalOpenings);
  lines.push('  Active candidates: ' + poc.activeCandidates);
  lines.push('  Hires: ' + poc.hires);
  var agingBand = computeAgingBand(poc.avgAging);
  lines.push('  Avg days since contact: ' + agingBand.label + ' (' + agingBand.band + ')');
  lines.push('');
  lines.push('ROLES');
  poc.roles.forEach(function(j) {
    var hb = healthBand(j._healthScore || 0);
    lines.push('  - ' + j.role_title + ' (' + j.bu + ' / ' + j.project_name + ')');
    lines.push('    Health: ' + (j._healthScore || 0) + '/100 (' + hb.band + ')');
    lines.push('    Openings: ' + (j.openings || 1) + ' | Active: ' + (j.active_candidates || 0) + ' | Hired: ' + (j.hired_count || 0));
    if (j.days_since_contact != null) lines.push('    Days since contact: ' + Math.round(j.days_since_contact));
  });
  var atRisk = poc.roles.filter(function(j) { return (j._healthScore || 0) < 40; });
  if (atRisk.length > 0) {
    lines.push('');
    lines.push('AT-RISK ROLES (' + atRisk.length + ')');
    atRisk.forEach(function(j) {
      lines.push('  ! ' + j.role_title + ' - Health: ' + (j._healthScore || 0));
    });
  }
  return lines.join('\n');
}

function renderPriorityQueue() {
  var actions = generatePriorityActions(FULFILLMENT_DATA);
  if (actions.length === 0) return '';

  var collapsed = priorityQueueOpen ? '' : ' collapsed';
  var chevron = priorityQueueOpen ? '▾' : '▸';

  var html = '<div class="priority-queue">';
  html += '<div class="priority-queue-header" onclick="priorityQueueOpen=!priorityQueueOpen;render();">';
  html += '<h3>' + chevron + ' 🎯 Priority Actions <span class="pq-count">' + actions.length + '</span></h3>';
  html += '</div>';
  html += '<div class="priority-queue-body' + collapsed + '">';
  html += '<div class="priority-cards">';

  actions.forEach(function(a, idx) {
    var j = a.job;
    var buColor = BU_COLORS[j.bu] || DEFAULT_BU_COLOR;

    html += '<div class="priority-card" data-pq-idx="' + idx + '">';
    // Severity dot
    html += '<div class="sev-dot sev-' + a.severity + '"></div>';
    // Content
    html += '<div class="pc-content">';
    html += '<div class="pc-title">' + escHTML(a.title) + '</div>';
    html += '<div class="pc-desc">' + escHTML(a.description) + '</div>';
    html += '<div class="pc-tags">';
    html += '<span class="pc-tag tier-tag">T' + a.tier + '</span>';
    html += '<span class="pc-tag" style="background:' + buColor + '15;color:' + buColor + '">' + escHTML(j.bu) + '</span>';
    html += '<span class="pc-tag">' + escHTML(j.project_name) + '</span>';
    if (j.poc_names) html += '<span class="pc-tag">👤 ' + escHTML(j.poc_names.split(/[\/,]/)[0].trim()) + '</span>';
    html += '</div>';
    html += '</div>';
    // Action button
    html += '<button class="pc-action" data-pq-action="' + a.action + '" data-pq-job-id="' + j.id + '" data-pq-role="' + escHTML(j.role_title) + '" data-pq-bu="' + escHTML(j.bu) + '">' + escHTML(a.actionLabel) + '</button>';
    html += '</div>';
  });

  html += '</div></div></div>';
  return html;
}

function bindPriorityQueueEvents() {
  document.querySelectorAll('.pc-action').forEach(function(btn) {
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      var action = btn.dataset.pqAction;
      var jobId = btn.dataset.pqJobId;
      var role = btn.dataset.pqRole;
      var bu = btn.dataset.pqBu;

      if (action === 'followup') {
        // Scroll to and highlight the job in Open Jobs
        var target = document.querySelector('[data-expand-job="' + jobId + '"]');
        if (target) {
          target.scrollIntoView({ behavior: 'smooth', block: 'center' });
          target.style.transition = 'box-shadow 0.3s';
          target.style.boxShadow = '0 0 0 3px #3B82F6';
          setTimeout(function() { target.style.boxShadow = ''; }, 3000);
        }
        // Also expand the job
        if (!expandedJobIds.has(jobId)) {
          expandedJobIds.add(jobId);
          render();
          setTimeout(function() {
            var t2 = document.querySelector('[data-expand-job="' + jobId + '"]');
            if (t2) {
              t2.scrollIntoView({ behavior: 'smooth', block: 'center' });
              t2.style.boxShadow = '0 0 0 3px #3B82F6';
              setTimeout(function() { t2.style.boxShadow = ''; }, 3000);
            }
          }, 100);
        }
      } else if (action === 'submit') {
        // Open chat with sourcing request
        if (!chatOpen) toggleChat();
        var msg = 'I need to submit candidates for the ' + role + ' role in ' + bu + '. Can you help me find and add qualified candidates?';
        chatMessages.push({ role: 'user', content: msg });
        renderChat();
        // Trigger Claude
        callClaude(msg);
      } else if (action === 'escalate') {
        // Open chat with escalation prompt
        if (!chatOpen) toggleChat();
        var msg2 = 'I need to escalate the ' + role + ' role in ' + bu + '. This role has been stale and needs attention. Can you draft an escalation summary?';
        chatMessages.push({ role: 'user', content: msg2 });
        renderChat();
        callClaude(msg2);
      }
    });
  });
}
