                '</div>';
            }
            html += '<div class="project-statuses">';
            Object.entries(projCandStatuses).forEach(function(se) {
              var st = se[0], count = se[1];
              var c = (STATUS_MAP[st] || {}).color || '#888';
              for (var i = 0; i < count; i++) html += '<span class="mini-pip" style="background:' + c + '" title="' + ((STATUS_MAP[st] || {}).label || st) + '"></span>';
            });
            html += '</div>' +
              '<div class="project-count">' + filteredJobs.length + ' role' + (filteredJobs.length > 1 ? 's' : '') + ' \u00B7 ' + projOpenings + ' opening' + (projOpenings > 1 ? 's' : '') + ' \u00B7 ' + projTotalCands + ' candidate' + (projTotalCands > 1 ? 's' : '') + '</div>' +
              '<div class="bu-actions" style="margin-left:auto;">' +
              '<button class="bu-action-btn" data-proj-add-job="' + escHTML(buName) + '||' + escHTML(projName) + '" title="Add a new job to ' + escHTML(projName) + '">' +
                '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M12 5v14M5 12h14"/></svg> Add Job</button>' +
              '<button class="bu-action-btn" data-proj-add-cand="' + escHTML(buName) + '||' + escHTML(projName) + '" title="Add a candidate to ' + escHTML(projName) + '">' +
                '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></svg> Add Candidate</button>' +
              '<button class="bu-action-btn" data-proj-client-view="' + escHTML(buName) + '||' + escHTML(projName) + '" title="Create client view for ' + escHTML(projName) + '">' +
                '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg> Client View</button>' +
              '</div></div>';
            html += '<div class="project-body">';

            // ── Project Dashboard ──
            var dashTotalOpenings = 0, dashTotalFilled = 0, dashTotalCands = 0, dashActiveCands = 0;
            var dashNoCandsRoles = [], dashStaleRoles = [], dashInterviewRoles = [], dashPendingRoles = [];
            var now = Date.now();
            filteredJobs.forEach(function(j) {
              var openings = j.openings || 1;
              var hired = j.hired_count || 0;
              dashTotalOpenings += openings;
              dashTotalFilled += hired;
              dashTotalCands += (j.total_candidates || 0);
              dashActiveCands += (j.active_candidates || 0);
              if (j.total_candidates === 0) dashNoCandsRoles.push(j.role_title);
              // Check staleness — no activity in 7+ days
              var lastActivity = j.candidates && j.candidates.length > 0 ?
                Math.max.apply(null, j.candidates.map(function(c) { return new Date(c.status_changed_at || c.date_introduced || 0).getTime(); })) : 0;
              if (j.total_candidates > 0 && hired < openings && lastActivity > 0 && (now - lastActivity) > 7 * 86400000) dashStaleRoles.push(j.role_title);
              // Check interview/pending states
              if (j.candidates) j.candidates.forEach(function(c) {
                var st = c._status || '';
                if ((st === 'interview_scheduled' || st === 'pending_2nd_interview') && dashInterviewRoles.indexOf(j.role_title) === -1) dashInterviewRoles.push(j.role_title);

              });
            });
            var dashFillPct = dashTotalOpenings > 0 ? Math.round((dashTotalFilled / dashTotalOpenings) * 100) : 0;
            var dashUnfilled = dashTotalOpenings - dashTotalFilled;
            var pctClass = dashFillPct >= 75 ? 'great' : dashFillPct >= 40 ? '' : dashFillPct > 0 ? 'caution' : 'danger';
            var overallCard = dashFillPct >= 75 ? 'good' : dashFillPct >= 40 ? '' : dashUnfilled > 0 && rolesNeedingSourcing.length > 0 ? 'urgent' : 'warn';

            html += '<div class="proj-dashboard">';

            html += '<div class="proj-dash-card ' + overallCard + '" style="display:flex; align-items:center; gap:16px;">' +

              '<div class="proj-progress-pct" style="color:' + (dashFillPct >= 75 ? '#059669' : dashFillPct >= 40 ? '#2563EB' : '#DC2626') + '">' + dashFillPct + '%</div>' +
              '<div style="font-size:10px; color:#94A3B8; font-weight:600;">FILLED</div></div>' +
              '<div style="flex:1; min-width:0;">' +
              '<div class="proj-progress-wrap"><div class="proj-progress-bar"><div class="proj-progress-fill ' + pctClass + '" style="width:' + dashFillPct + '%"></div></div>' +
              '<div class="proj-progress-stats"><span>' + dashTotalFilled + ' filled of ' + dashTotalOpenings + ' opening' + (dashTotalOpenings > 1 ? 's' : '') + '</span>' +
              '<span>' + dashUnfilled + ' still needed</span></div></div></div>' +
              '</div>';

            // Card 2: Urgency / Action Items
            // rolesNeedingSourcing already computed above (no candidates OR all candidates dead-end)
            // dashNoCandsRoles = subset with literally zero candidates
            var rolesAllDead = rolesNeedingSourcing.filter(function(r) { return dashNoCandsRoles.indexOf(r) === -1; });
            var hasAlerts = rolesNeedingSourcing.length > 0 || dashStaleRoles.length > 0 || dashInterviewRoles.length > 0 || dashPendingRoles.length > 0;
            var alertCard = rolesNeedingSourcing.length > 0 ? 'urgent' : dashStaleRoles.length > 0 ? 'warn' : 'good';
            html += '<div class="proj-dash-card ' + alertCard + '">' +

            }
            if (dashInterviewRoles.length > 0) {
              html += '<div class="proj-alert-item info"><span class="proj-alert-icon">\uD83D\uDCC5</span><span><strong>' + dashInterviewRoles.length + ' in interviews</strong> — ' + dashInterviewRoles.join(', ') + '</span></div>';
            }
            html += '</div></div>';

            // Card 3: Role-by-role breakdown (full width)
            html += '<div class="proj-dash-card proj-dashboard-full">' +
              '<div class="proj-dash-label">Roles</div>' +
              '<div class="proj-roles-grid">';
            filteredJobs.forEach(function(j) {
              var openings = j.openings || 1;
              var hired = j.hired_count || 0;
              var unfilled = openings - hired;
              var fillPct = openings > 0 ? Math.round((hired / openings) * 100) : 0;
              var ringColor = fillPct >= 100 ? '#059669' : fillPct >= 50 ? '#3B82F6' : j.total_candidates === 0 ? '#EF4444' : '#F59E0B';
              var circumference = 2 * Math.PI * 16;

              var needsAttn = j.total_candidates === 0 || (unfilled > 0 && j.active_candidates === 0);

              // Determine badge
              var badgeHTML = '';

              else {
                var hasInterview = j.candidates && j.candidates.some(function(c) { var s = c._status || ''; return s === 'interview_scheduled' || s === 'pending_2nd_interview' || s === 'pending_interview'; });
                if (hasInterview) badgeHTML = '<span class="proj-role-badge interviewing">\uD83D\uDCC5 Interviewing</span>';

              html += '<div class="proj-role-row' + (needsAttn ? ' needs-attention' : '') + '">' +
                '<div class="proj-role-ring">' +

                  '<circle cx="21" cy="21" r="16" fill="none" stroke="' + ringColor + '" stroke-width="4" stroke-linecap="round" ' +
                    'stroke-dasharray="' + circumference.toFixed(1) + '" stroke-dashoffset="' + dashOffset.toFixed(1) + '"/></svg>' +

                '<div class="proj-role-info">' +
                  '<div class="proj-role-name">' + escHTML(j.role_title) + '</div>' +

                    '<span>\uD83D\uDC65 <strong>' + (j.active_candidates || 0) + '</strong> active</span>' +
                    '<span>\uD83D\uDCCA <strong>' + (j.total_candidates || 0) + '</strong> total</span>' +
                    (j.rate_max ? '<span>\uD83D\uDCB0 $' + j.rate_max + '/hr</span>' : '') +
                  '</div>' +
                '</div>' +
                '<div class="proj-role-badges">' + badgeHTML + '</div>' +
              '</div>';
            });
            html += '</div></div>';

            html += '</div>'; // close proj-dashboard

            // ── Individual Role Details (below dashboard) ──
            var _deadSt = new Set(['rejected', 'withdrawn', 'unavailable', 'removed_location', 'on_hold', 'consider_other']);
            filteredJobs.forEach(function(j) {
              var openings = j.openings || 1;
              var hired = j.hired_count || 0;
              var unfilled = openings - hired;
              var totalC = j.total_candidates || 0;
              var activeC = j.active_candidates || 0;
              var viableC = 0, interviewC = 0, pendingC = 0, rejectedC = 0, introducedC = 0;
              if (j.candidates) j.candidates.forEach(function(c) {
                var st = c._status || 'other';
                if (!_deadSt.has(st)) viableC++;
                if (st === 'introduced') introducedC++;
                if (st === 'interview_scheduled' || st === 'pending_interview' || st === 'pending_2nd_interview') interviewC++;
                if (st === 'pending_decision') pendingC++;
                if (_deadSt.has(st)) rejectedC++;
              });
              var fillPct = openings > 0 ? Math.round((hired / openings) * 100) : 0;

              // Determine overall status
              var roleSt = '', roleStClass = '';
              if (fillPct >= 100) { roleSt = '\u2705 Fully Filled'; roleStClass = 'good'; }
              else if (viableC === 0 && totalC > 0) { roleSt = '\uD83D\uDEA8 All Candidates Exhausted — Need New Sourcing'; roleStClass = 'critical'; }
              else if (totalC === 0) { roleSt = '\uD83D\uDEA8 No Candidates — Needs Immediate Sourcing'; roleStClass = 'critical'; }
              else if (pendingC > 0) { roleSt = '\uD83D\uDCCB Pending Decision'; roleStClass = 'info'; }
              else if (interviewC > 0) { roleSt = '\uD83D\uDCC5 Interviews In Progress'; roleStClass = 'info'; }
              else if (activeC > 0 && activeC < unfilled) { roleSt = '\u26A0\uFE0F Need More Candidates (' + activeC + ' active for ' + unfilled + ' opening' + (unfilled > 1 ? 's' : '') + ')'; roleStClass = 'warning'; }
              else if (activeC >= unfilled) { roleSt = '\u2714\uFE0F Pipeline On Track'; roleStClass = 'good'; }
              else { roleSt = '\u26A0\uFE0F Needs Attention'; roleStClass = 'warning'; }

              html += '<div style="margin: 0 12px 12px; padding:14px 16px; background:white; border:1px solid #EDF0F4; border-radius:8px;" data-job-card="' + j.id + '">';

              // Check if this job is being edited
              if (editingJobId === j.id) {
                html += renderJobEditForm(j);
              } else {
              html += '<div style="display:flex; align-items:center; gap:10px; margin-bottom:10px; flex-wrap:wrap;">' +
                '<span style="font-weight:700; font-size:17px; color:#1E293B;">' + escHTML(j.role_title) + '</span>';
              if (j.rate_max) html += '<span class="open-job-tag rate-tag">\uD83D\uDCB0 $' + j.rate_max + '/hr</span>';
              if (j.status && j.status !== 'ACTIVE') html += '<span class="open-job-tag status-tag">' + escHTML(j.status) + '</span>';
              if (j.toptal_job_link) html += '<a href="' + escHTML(j.toptal_job_link) + '" target="_blank" style="font-size:11px; color:var(--toptal-blue); text-decoration:none; font-weight:600;">Platform \u2197</a>';
              if (j.salesforce_link) html += '<a href="' + escHTML(j.salesforce_link) + '" target="_blank" style="font-size:11px; color:var(--toptal-blue); text-decoration:none; font-weight:600;">SFDC \u2197</a>';
              html += '<div style="margin-left:auto; display:flex; gap:4px;">' +
                '<button data-edit-job="' + j.id + '" style="background:none; border:1px solid #D1D5DE; border-radius:6px; padding:3px 8px; cursor:pointer; font-size:12px; color:#6B7280; display:flex; align-items:center; gap:4px;" title="Edit job details">✏️ Edit</button>' +
                '<button data-delete-job="' + j.id + '" data-delete-job-name="' + escHTML(j.role_title) + '" style="background:none; border:1px solid #FECACA; border-radius:6px; padding:3px 8px; cursor:pointer; font-size:12px; color:#DC2626; display:flex; align-items:center; gap:4px;" title="Delete job">🗑️ Delete</button>' +
                '</div>';
              html += '</div>';

              // Fulfillment summary bar
              var progressColor = fillPct >= 100 ? '#059669' : fillPct >= 50 ? '#3B82F6' : viableC === 0 ? '#DC2626' : '#F59E0B';
              html += '<div class="role-fulfill-bar">' +
                '<div class="role-fulfill-cell' + (unfilled > 0 && viableC === 0 ? ' highlight-red' : unfilled === 0 ? ' highlight-green' : '') + '">' +
                  '<div class="role-fulfill-num ' + (unfilled > 0 ? (viableC === 0 ? 'red' : 'amber') : 'green') + '">' + unfilled + '/' + openings + '</div>' +
                  '<div class="role-fulfill-label">Openings Left</div>' +
                  '<div class="role-fulfill-progress"><div class="role-fulfill-progress-fill" style="width:' + fillPct + '%; background:' + progressColor + '"></div></div>' +
                '</div>' +
                '<div class="role-fulfill-cell' + (viableC === 0 && totalC > 0 ? ' highlight-red' : viableC > 0 ? ' highlight-blue' : '') + '">' +
                  '<div class="role-fulfill-num ' + (viableC === 0 ? (totalC > 0 ? 'red' : 'muted') : 'blue') + '">' + viableC + '</div>' +
                  '<div class="role-fulfill-label">Active Pipeline</div>' +
                '</div>' +
                '<div class="role-fulfill-cell' + (introducedC > 0 ? ' highlight-blue' : '') + '">' +
                  '<div class="role-fulfill-num ' + (introducedC > 0 ? 'blue' : 'muted') + '">' + introducedC + '</div>' +
                  '<div class="role-fulfill-label">Introduced</div>' +
                '</div>' +
                '<div class="role-fulfill-cell' + (interviewC > 0 ? ' highlight-purple' : '') + '">' +
                  '<div class="role-fulfill-num ' + (interviewC > 0 ? 'purple' : 'muted') + '">' + interviewC + '</div>' +
                  '<div class="role-fulfill-label">Interviewing</div>' +
                '</div>' +
                '<div class="role-fulfill-cell' + (pendingC > 0 ? ' highlight-amber' : '') + '">' +
                  '<div class="role-fulfill-num ' + (pendingC > 0 ? 'amber' : 'muted') + '">' + pendingC + '</div>' +
                  '<div class="role-fulfill-label">Pending Decision</div>' +
                '</div>' +
                '<div class="role-fulfill-cell' + (rejectedC > 0 && viableC === 0 ? ' highlight-red' : '') + '">' +
                  '<div class="role-fulfill-num ' + (rejectedC > 0 ? 'red' : 'muted') + '">' + rejectedC + '</div>' +
                  '<div class="role-fulfill-label">Rejected / Out</div>' +
                '</div>' +
              '</div>';

              // Status verdict
              html += '<div style="margin-bottom:12px; text-align:center;">' +
                '<span class="role-fulfill-status ' + roleStClass + '">' + roleSt + '</span>' +
              '</div>';

              html += renderOJCandidates(j);
              } // end else (not editing)
              html += '</div>';
            });

            html += '</div></div>'; // close project-body, project-section
          });

          html += '</div></div>'; // close bu-body, bu-section
        });
      }

      html += '</div></div>';
    }
  }
  return html;
}

// ═══════════════════════════════════════════════════
//  EVENTS
// ═══════════════════════════════════════════════════
function bindEvents() {
  // Filter buttons
  document.querySelectorAll('.filter-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var s = btn.dataset.status;
      if (activeFilters.has(s)) activeFilters.delete(s); else activeFilters.add(s);
      render();
    });
  });

  // Search
  var searchEl = document.getElementById('searchInput');
  if (searchEl) {
    searchEl.addEventListener('input', function(e) {
      searchQuery = e.target.value.toLowerCase();
      var pos = e.target.selectionStart;
      render();
      var inp = document.getElementById('searchInput');
      if (inp) { inp.focus(); inp.setSelectionRange(pos, pos); }
    });
  }

  // "Send to Client" buttons on candidate rows
  document.querySelectorAll('[data-send-to-cv]').forEach(function(btn) {
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      showSendToClientModal(btn.dataset.sendToCv, btn.dataset.shareId, btn);
    });
  });

  // "Remove from Client View" buttons
  document.querySelectorAll('[data-remove-from-cv]').forEach(function(btn) {
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      if (confirm('Remove this candidate from the client view?')) {
        removeCandidateFromClientView(btn.dataset.removeFromCv, btn.dataset.shareId);
      }
    });
  });

  // Project-level "Add Job" buttons (BU + project encoded as "BU||Project")
  document.querySelectorAll('[data-proj-add-job]').forEach(function(btn) {
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      var parts = (btn.dataset.projAddJob || '').split('||');
      showJobForm(parts[0], parts[1]);
    });
  });

  // Project-level "Add Candidate" buttons
  document.querySelectorAll('[data-proj-add-cand]').forEach(function(btn) {
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      var parts = (btn.dataset.projAddCand || '').split('||');
      showCandidateForm(parts[0], parts[1]);
    });
  });

  // Project-level "Client View" buttons
  document.querySelectorAll('[data-proj-client-view]').forEach(function(btn) {
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      var parts = (btn.dataset.projClientView || '').split('||');
      showClientViewModal(parts[0], parts[1]);
    });
  });

  // BU filter: Project dropdown
  document.querySelectorAll('[data-bu-filter-project]').forEach(function(sel) {
    sel.addEventListener('click', function(e) { e.stopPropagation(); });
    sel.addEventListener('change', function() {
      var buKey = sel.dataset.buFilterProject;
      if (sel.value) buFilterProject[buKey] = sel.value;
      else delete buFilterProject[buKey];
      render();
    });
  });

  // BU filter: Role dropdown
  document.querySelectorAll('[data-bu-filter-role]').forEach(function(sel) {
    sel.addEventListener('click', function(e) { e.stopPropagation(); });
    sel.addEventListener('change', function() {
      var buKey = sel.dataset.buFilterRole;
      if (sel.value) buFilterRole[buKey] = sel.value;
      else delete buFilterRole[buKey];
      render();
    });
  });

  // BU filter: Clear button
  document.querySelectorAll('[data-bu-filter-clear]').forEach(function(btn) {
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      var buKey = btn.dataset.buFilterClear;
      delete buFilterProject[buKey];
      delete buFilterRole[buKey];
      render();
    });
  });

  // Section filter pills (per-project status filters)
  document.querySelectorAll('[data-section-filter]').forEach(function(pill) {
    pill.addEventListener('click', function(e) {
      e.stopPropagation();
      var status = pill.dataset.sectionFilter;
      var key = pill.dataset.sectionKey;
      if (!sectionFilters[key]) sectionFilters[key] = new Set();
      if (sectionFilters[key].has(status)) sectionFilters[key].delete(status);
      else sectionFilters[key].add(status);
      if (sectionFilters[key].size === 0) delete sectionFilters[key];
      render();
    });
  });

  // Section filter clear buttons
  document.querySelectorAll('[data-section-clear]').forEach(function(btn) {
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      var key = btn.dataset.sectionClear;
      delete sectionFilters[key];
      render();
    });
  });

  // Status dropdown changes — show Save button on change
  document.querySelectorAll('.status-dropdown').forEach(function(sel) {
    sel.addEventListener('click', function(e) { e.stopPropagation(); });
    sel.addEventListener('change', function() {
      var newStatus = sel.value;
      var originalStatus = sel.dataset.originalStatus;
      var cfg = STATUS_MAP[newStatus] || {};
      sel.style.borderColor = cfg.color || '#E5E7EB';
      sel.style.color = cfg.color || '#374151';
      // Update action badge
      var wrap = sel.closest('.status-dropdown-wrap');
      if (wrap) {
        var badge = wrap.querySelector('.action-badge');
        if (badge && cfg.actionLabel) {
          badge.className = 'action-badge ' + (cfg.actionClass || '');
          badge.textContent = cfg.actionLabel;
        } else if (badge && !cfg.actionLabel) {
          badge.remove();
        }
        // Show/hide Save button
        var saveBtn = wrap.querySelector('.status-save-btn');
        if (saveBtn) {
          if (newStatus !== originalStatus) {
            saveBtn.classList.add('visible');
            saveBtn.classList.remove('saved', 'saving');
            saveBtn.querySelector('.save-text').textContent = 'Save';
            sel.classList.add('changed');
          } else {
            saveBtn.classList.remove('visible', 'saved', 'saving');
            sel.classList.remove('changed');
          }
        }
      }
    });
  });

  // Save button click — persist to Supabase and refresh data
  document.querySelectorAll('.status-save-btn').forEach(function(btn) {
    btn.addEventListener('click', async function(e) {
      e.stopPropagation();
      var wrap = btn.closest('.status-dropdown-wrap');
      var sel = wrap ? wrap.querySelector('.status-dropdown') : null;
      if (!sel) return;
      var newStatus = sel.value;
      var cfg = STATUS_MAP[newStatus] || {};
      var jcId = sel.dataset.jcId;

      // Visual feedback — saving
      btn.classList.add('saving');
      btn.querySelector('.save-text').textContent = 'Saving…';

      if (jcId && cfg.dbValue && typeof sb !== 'undefined') {
        var now = new Date().toISOString();
        var updateData = { status: cfg.dbValue, status_changed_at: now, updated_at: now };
        if (cfg.dbValue === 'INTERVIEW SCHEDULED') updateData.date_interview = now;
        if (cfg.dbValue === 'ACTIVE') updateData.date_hired = now;

        var res = await sb.from('job_candidates').update(updateData).eq('id', jcId);
        if (res.error) {
          console.warn('Status update failed:', res.error.message);
          btn.classList.remove('saving');
          btn.querySelector('.save-text').textContent = '✕ Error';
          btn.style.background = '#DC2626';
          setTimeout(function() {
            btn.style.background = '';
            btn.querySelector('.save-text').textContent = 'Save';
          }, 2000);
          return;
        }

        // Log activity
        sb.from('activity_log').insert({
          entity_type: 'job_candidate', entity_id: jcId,
          action: 'status_change', new_value: cfg.dbValue,
          source: 'pipeline_ui'
        }).then(function() {});

        // Show saved confirmation
        btn.classList.remove('saving');
        btn.classList.add('saved');
        sel.classList.remove('changed');
        sel.dataset.originalStatus = newStatus;

        // Re-fetch all data so Open Jobs + Fulfillment reflect the change
        setTimeout(async function() {
          btn.classList.remove('visible', 'saved');
          await fetchAllData();
        }, 1200);
      } else {
        // No jcId — just reset
        btn.classList.remove('saving', 'visible');
        sel.classList.remove('changed');
      }
    });
  });

  // Editable date cells — click to open date picker, save on change
  document.querySelectorAll('.date-cell-editable').forEach(function(cell) {
    var display = cell.querySelector('.date-display');
    var input = cell.querySelector('.date-edit-input');
    if (!display || !input) return;

    // Click display to open editor
    display.addEventListener('click', function(e) {
      e.stopPropagation();
      display.classList.add('hidden');
      input.classList.add('active');
      input.focus();
    });

    // Save on change
    input.addEventListener('change', async function() {
      var jcId = cell.dataset.jcId;
      var field = cell.dataset.dateField;
      var val = input.value; // YYYY-MM-DD or empty
      if (!jcId || !field) return;

      cell.classList.add('date-saving');
      var updateData = {};
      updateData[field] = val || null;
      updateData.updated_at = new Date().toISOString();

      if (typeof sb !== 'undefined') {
        var res = await sb.from('job_candidates').update(updateData).eq('id', jcId);
        if (res.error) {
          console.warn('Date update failed:', res.error.message);
          cell.classList.remove('date-saving');
          input.classList.remove('active');
          display.classList.remove('hidden');
          return;
        }

        sb.from('activity_log').insert({
          entity_type: 'job_candidate', entity_id: jcId,
          action: field + '_change', new_value: val || 'cleared',
          source: 'pipeline_ui'
        }).then(function() {});
      }

      cell.classList.remove('date-saving');
      input.classList.remove('active');
      display.classList.remove('hidden');
      cell.classList.add('date-saved-flash');

      // Update display text
      if (val) {
        var parts = val.split('-');
        var d = new Date(parts[0], parts[1] - 1, parts[2]);
        var formatted = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        var isInterview = field === 'date_interview';
        var editIcon = display.querySelector('.edit-icon');
        display.innerHTML = (isInterview ? '\uD83D\uDCC5 ' : '') + formatted + '<span class="edit-icon">\u270E</span>';
      } else {
        display.innerHTML = '\u2014<span class="edit-icon">\u270E</span>';
      }

      setTimeout(function() { cell.classList.remove('date-saved-flash'); }, 1100);

      // Refresh data after brief delay
      setTimeout(async function() { await fetchAllData(); }, 1500);
    });

    // Close on blur (if not changed)
    input.addEventListener('blur', function() {
      setTimeout(function() {
        input.classList.remove('active');
        display.classList.remove('hidden');
      }, 150);
    });
  });

  // Expand all
  var expandBtn = document.getElementById('expandAllBtn');
  if (expandBtn) {
    expandBtn.addEventListener('click', function() {
      if (allExpanded) {
        ojOpenBUs.clear(); ojOpenProjects.clear(); allExpanded = false;
      } else {
        PIPELINE_DATA.forEach(function(bu) {
          ojOpenBUs.add(bu.businessUnit);
          bu.projects.forEach(function(p) { ojOpenProjects.add(bu.businessUnit + '::' + p.name); });
        });
        allExpanded = true;
      }
      render();
    });
  }

  // Notification bell
  var notifBellBtn = document.getElementById('notifBellBtn');
  if (notifBellBtn) {
    notifBellBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      notifDropdownOpen = !notifDropdownOpen;
      var dd = document.getElementById('notifDropdown');
      if (dd) {
        dd.classList.toggle('open', notifDropdownOpen);
        if (notifDropdownOpen) renderNotifications();
      }
    });
  }
  document.addEventListener('click', function(e) {
    if (notifDropdownOpen && !e.target.closest('.notif-bell-wrap')) {
      notifDropdownOpen = false;
      var dd = document.getElementById('notifDropdown');
      if (dd) dd.classList.remove('open');
    }
  });

  // Refresh
  var refreshBtn = document.getElementById('refreshBtn');
  if (refreshBtn) {
    refreshBtn.addEventListener('click', function() {
      refreshBtn.classList.add('spinning');
      refreshData().then(function() { setTimeout(function() { var b = document.getElementById('refreshBtn'); if(b) b.classList.remove('spinning'); }, 600); });
    });
  }

  // Wins toggle
  var winsToggle = document.getElementById('winsToggle');
  if (winsToggle) {
    winsToggle.addEventListener('click', function(e) {
      if (e.target.closest('.view-toggle')) return; // don't collapse when clicking view toggle
      winsOpen = !winsOpen; render();
    });
  }

  var openJobsToggle = document.getElementById('openJobsToggle');
  if (openJobsToggle) {
    openJobsToggle.addEventListener('click', function(e) {
      if (e.target.closest('.bu-actions')) return;
      openJobsOpen = !openJobsOpen; render();
    });
  }

  // Open Jobs: BU toggles
  document.querySelectorAll('[data-toggle-oj-bu]').forEach(function(el) {
    el.addEventListener('click', function(e) {
      if (e.target.closest('.bu-actions')) return;
      var key = el.dataset.toggleOjBu;
      if (ojOpenBUs.has(key)) ojOpenBUs.delete(key); else ojOpenBUs.add(key);
      render();
    });
  });

  // Open Jobs: Project toggles
  document.querySelectorAll('[data-toggle-oj-project]').forEach(function(el) {
    el.addEventListener('click', function(e) {
      if (e.target.closest('.bu-actions')) return;
      var key = el.dataset.toggleOjProject;
      if (ojOpenProjects.has(key)) ojOpenProjects.delete(key); else ojOpenProjects.add(key);
      render();
    });
  });

  // View toggle buttons (card/list)
  document.querySelectorAll('[data-view-toggle]').forEach(function(btn) {
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      var mode = btn.dataset.viewToggle;
      if (mode === 'wins-card') { winsViewMode = 'card'; render(); }
      else if (mode === 'wins-list') { winsViewMode = 'list'; render(); }
      else if (mode === 'oj-card') { openJobsViewMode = 'card'; render(); }
      else if (mode === 'oj-list') { openJobsViewMode = 'list'; render(); }
    });
  });

  // Open Jobs header: Add Job / Add Candidate buttons (no project context)
  document.querySelectorAll('[data-oj-add-job]').forEach(function(btn) {
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      showJobForm('', '');
    });
  });
  document.querySelectorAll('[data-oj-add-cand]').forEach(function(btn) {
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      showCandidateForm('', '');
    });
  });

  // Open Jobs filters
  var ojBUEl = document.getElementById('ojFilterBU');
  if (ojBUEl) ojBUEl.addEventListener('change', function() { ojFilterBU = this.value; render(); });
  var ojProjEl = document.getElementById('ojFilterProject');
  if (ojProjEl) ojProjEl.addEventListener('change', function() { ojFilterProject = this.value; render(); });
  var ojRoleEl = document.getElementById('ojFilterRole');
  if (ojRoleEl) ojRoleEl.addEventListener('change', function() { ojFilterRole = this.value; render(); });
  var ojStatusEl = document.getElementById('ojFilterStatus');
  if (ojStatusEl) ojStatusEl.addEventListener('change', function() { ojFilterStatus = this.value; render(); });
  var ojPOCEl = document.getElementById('ojFilterPOC');
  if (ojPOCEl) ojPOCEl.addEventListener('change', function() { ojFilterPOC = this.value; render(); });
  var ojClearEl = document.getElementById('ojFilterClear');
  if (ojClearEl) ojClearEl.addEventListener('click', function(e) {
    e.stopPropagation();
    ojFilterBU = ''; ojFilterProject = ''; ojFilterRole = ''; ojFilterStatus = ''; ojFilterPOC = ''; searchQuery = '';
    render();
  });


  // Expand/collapse Open Job cards
  document.querySelectorAll('[data-expand-job]').forEach(function(el) {
    el.addEventListener('click', function(e) {
      if (e.target.closest('a') || e.target.closest('select') || e.target.closest('button') || e.target.closest('input') || e.target.closest('textarea')) return;
      var jobId = el.dataset.expandJob;
      if (expandedJobIds.has(jobId)) expandedJobIds.delete(jobId); else expandedJobIds.add(jobId);
      render();
    });
  });

  // Edit Job button
  document.querySelectorAll('[data-edit-job]').forEach(function(btn) {
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      editingJobId = btn.dataset.editJob;
      render();
    });
  });

  // Cancel Edit Job
  document.querySelectorAll('[data-cancel-edit-job]').forEach(function(btn) {
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      editingJobId = null;
      render();
    });
  });

  // Save Job Edit
  document.querySelectorAll('[data-save-job]').forEach(function(btn) {
    btn.addEventListener('click', async function(e) {
      e.stopPropagation();
      var jobId = btn.dataset.saveJob;
      var card = document.querySelector('[data-job-card="' + jobId + '"]');
      if (!card) return;

      var updates = {};
      var fields = ['role_title', 'bu', 'project_name', 'poc_names', 'openings', 'status', 'rate_max', 'toptal_job_link', 'salesforce_link', 'sow_number', 'duration', 'poc_emails', 'notes'];
      fields.forEach(function(f) {
        var el = card.querySelector('[data-edit-field="' + f + '"]');
        if (!el) return;
        var val = el.value.trim();
        if (f === 'openings') val = parseInt(val) || 1;
        else if (f === 'rate_max') val = val ? parseFloat(val) : null;
        else val = val || null;
        updates[f] = val;
      });

      // Validate required
      if (!updates.role_title) { alert('Role title is required'); return; }
      if (!updates.bu) { alert('Business unit is required'); return; }

      btn.disabled = true;
      btn.textContent = 'Saving...';
      updates.updated_by = currentUser ? currentUser.id : null;

      try {
        var { error } = await sb.from('jobs').update(updates).eq('id', jobId);
        if (error) {
          alert('Failed to save: ' + error.message);
          btn.disabled = false;
          btn.textContent = '💾 Save Changes';
          return;
        }
        await logActivity('job', jobId, 'update', { note: 'Edited job: ' + updates.role_title });
        editingJobId = null;
        await refreshData();
        render();
      } catch(err) {
        alert('Error saving job: ' + err.message);
        btn.disabled = false;
        btn.textContent = '💾 Save Changes';
      }
    });
  });

  // Delete Job
  document.querySelectorAll('[data-delete-job]').forEach(function(btn) {
    btn.addEventListener('click', async function(e) {
      e.stopPropagation();
      var jobId = btn.dataset.deleteJob;
      var jobName = btn.dataset.deleteJobName || 'this job';
      if (!confirm('Delete "' + jobName + '"?\n\nThis will also remove all candidates linked to this job. This cannot be undone.')) return;
      btn.disabled = true;
      btn.textContent = 'Deleting...';
      try {
        // Delete job_candidates first, then the job
        // Clean up client_actions_log and client_shares for this job's candidates
        var { data: jcRows } = await sb.from('job_candidates').select('id').eq('job_id', jobId);
        if (jcRows && jcRows.length > 0) {
          var jcDelIds = jcRows.map(function(r) { return r.id; });
          for (var di = 0; di < jcDelIds.length; di++) {
            await sb.from('client_actions_log').delete().eq('job_candidate_id', jcDelIds[di]);
          }
        }
        await sb.from('job_candidates').delete().eq('job_id', jobId);
        var { error } = await sb.from('jobs').delete().eq('id', jobId);
        if (error) { alert('Failed to delete: ' + error.message); btn.disabled = false; btn.textContent = '🗑️ Delete'; return; }
        await logActivity('job', jobId, 'delete', { note: 'Deleted job: ' + jobName });
        await refreshData();
        render();
      } catch(err) {
        alert('Error deleting job: ' + err.message);
        btn.disabled = false;
        btn.textContent = '🗑️ Delete';
      }
    });
  });

  // Delete BU (all jobs in that business unit)
  document.querySelectorAll('[data-delete-bu]').forEach(function(btn) {
    btn.addEventListener('click', async function(e) {
      e.stopPropagation();
      var buName = btn.dataset.deleteBu;
      var buJobs = (FULFILLMENT_DATA || []).filter(function(j) { return j.bu === buName; });
      if (buJobs.length === 0) { alert('No jobs found in ' + buName); return; }
      if (!confirm('Delete the entire "' + buName + '" business unit?\n\nThis will delete ' + buJobs.length + ' job(s) and all their candidates. This cannot be undone.')) return;
      btn.disabled = true;
      btn.textContent = 'Deleting...';
      try {
        var jobIds = buJobs.map(function(j) { return j.id; });
        // Delete all job_candidates for these jobs
        for (var i = 0; i < jobIds.length; i++) {
          await sb.from('job_candidates').delete().eq('job_id', jobIds[i]);
        }
        // Delete all jobs
        var { error } = await sb.from('jobs').delete().in('id', jobIds);
        if (error) { alert('Failed to delete: ' + error.message); btn.disabled = false; btn.textContent = '🗑️ Delete BU'; return; }
        await logActivity('bu', buName, 'delete', { note: 'Deleted BU: ' + buName + ' (' + jobIds.length + ' jobs)' });
        await refreshData();
        render();
      } catch(err) {
        alert('Error deleting BU: ' + err.message);
        btn.disabled = false;
        btn.textContent = '🗑️ Delete BU';
      }
    });
  });

  // Delete Candidate
  document.querySelectorAll('[data-delete-candidate]').forEach(function(btn) {
    btn.addEventListener('click', async function(e) {
      e.stopPropagation();
      var jcId = btn.dataset.deleteCandidate;
      var candName = btn.dataset.deleteCandidateName || 'this candidate';
      if (!confirm('Remove "' + candName + '" from this job?\n\nThis deletes the job-candidate link. The candidate record itself is preserved.')) return;
      btn.disabled = true;
      try {
        // 1. Delete client_actions_log entries referencing this job_candidate
        await sb.from('client_actions_log').delete().eq('job_candidate_id', jcId);
        // 2. Remove from any client_shares.job_candidate_ids arrays
        var { data: shares } = await sb.from('client_shares').select('id, job_candidate_ids').filter('job_candidate_ids', 'cs', '{"' + jcId + '"}');
        if (shares && shares.length > 0) {
          for (var si = 0; si < shares.length; si++) {
            var updatedIds = (shares[si].job_candidate_ids || []).filter(function(id) { return id !== jcId; });
            await sb.from('client_shares').update({ job_candidate_ids: updatedIds }).eq('id', shares[si].id);
          }
        }
        // 3. Delete the job_candidate link
        var { error } = await sb.from('job_candidates').delete().eq('id', jcId);
        if (error) { alert('Failed to remove: ' + error.message); btn.disabled = false; return; }
        await logActivity('job_candidate', jcId, 'delete', { note: 'Removed candidate: ' + candName });
        await refreshData();
        render();
      } catch(err) {
        alert('Error removing candidate: ' + err.message);
        btn.disabled = false;
      }
    });
  });

  // View tabs
  document.querySelectorAll('.view-tab').forEach(function(tab) {
    tab.addEventListener('click', async function() {
      currentView = tab.dataset.view;
      if (currentView === 'admin' && adminMembers.length === 0) {
        await loadAdminData();
      }
      render();
    });
  });

  // Chat FAB
  var chatFab = document.getElementById('chatFab');
  if (chatFab) {
    chatFab.addEventListener('click', toggleChat);
  }

  // Quick-action buttons
  var quickAddJobBtn = document.getElementById('quickAddJob');
  if (quickAddJobBtn) {
    quickAddJobBtn.addEventListener('click', function() {
      showJobForm();
    });
  }
  var quickAddCandBtn = document.getElementById('quickAddCandidate');
  if (quickAddCandBtn) {
    quickAddCandBtn.addEventListener('click', function() {
      showCandidateForm();
    });
  }

  // User menu dropdown toggle
  var userMenuBtn = document.getElementById('userMenuBtn');
  var userDropdown = document.getElementById('userDropdown');
  if (userMenuBtn && userDropdown) {
    userMenuBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      userDropdown.classList.toggle('open');
    });
    document.addEventListener('click', function() {
      userDropdown.classList.remove('open');
    });
  }

  // Sign out
  var signOutBtn = document.getElementById('signOutBtn');
  if (signOutBtn) {
    signOutBtn.addEventListener('click', function() {
      sb.auth.signOut();
    });
  }

  // Admin: Create User
  var inviteSendBtn = document.getElementById('inviteSendBtn');
  if (inviteSendBtn) {
    inviteSendBtn.addEventListener('click', async function() {
      var email = document.getElementById('inviteEmail').value.trim();
      var name = document.getElementById('inviteName').value.trim();
      var password = document.getElementById('invitePassword').value;
      var role = document.getElementById('inviteRole').value;
      var msgEl = document.getElementById('inviteMsg');
      if (!name) { msgEl.textContent = 'Full name is required'; msgEl.style.color = 'var(--rose)'; return; }
      if (!email) { msgEl.textContent = 'Email is required'; msgEl.style.color = 'var(--rose)'; return; }
      if (!password || password.length < 6) { msgEl.textContent = 'Password must be at least 6 characters'; msgEl.style.color = 'var(--rose)'; return; }

      inviteSendBtn.disabled = true;
      inviteSendBtn.textContent = 'Creating...';
      try {
        var token = await getAccessToken();
        var resp = await fetch('/api/invite', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
          body: JSON.stringify({ email: email, full_name: name, password: password, role: role })
        });
        var result = await resp.json();
        if (result.success) {
          adminInviteMsg = '<span style="color:var(--green)">✅ User ' + escHTML(name) + ' (' + escHTML(email) + ') created as ' + escHTML(role) + '</span>';
          document.getElementById('inviteEmail').value = '';
          document.getElementById('inviteName').value = '';
          document.getElementById('invitePassword').value = '';
          document.getElementById('inviteRole').value = 'member';
          await loadAdminData();
        } else {
          adminInviteMsg = '<span style="color:var(--rose)">' + escHTML(result.error || 'Failed') + '</span>';
        }
      } catch(e) {
        adminInviteMsg = '<span style="color:var(--rose)">Network error</span>';
      }
      inviteSendBtn.disabled = false;
      inviteSendBtn.textContent = 'Create User';
      render();
    });
  }

  // Admin: Remove user
  document.querySelectorAll('[data-remove-user]').forEach(function(btn) {
    btn.addEventListener('click', async function() {
      var userId = btn.dataset.removeUser;
      var member = adminMembers.find(function(m) { return m.id === userId; });
      var confirmName = member ? (member.full_name || member.email) : userId;
      if (!confirm('Remove user "' + confirmName + '"? This cannot be undone.')) return;
      btn.disabled = true;
      btn.textContent = 'Removing...';
      try {
        var token = await getAccessToken();
        var resp = await fetch('/api/invite', {
          method: 'DELETE',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
          body: JSON.stringify({ user_id: userId })
        });
        var result = await resp.json();
        if (result.success) {
          await loadAdminData();
          render();
        } else {
          alert('Failed to remove user: ' + (result.error || 'Unknown error'));
          btn.disabled = false;
          btn.textContent = 'Remove';
        }
      } catch(e) {
        alert('Network error removing user');
        btn.disabled = false;
        btn.textContent = 'Remove';
      }
    });
  });

  // Admin: Role toggle
  document.querySelectorAll('[data-toggle-role]').forEach(function(btn) {
    btn.addEventListener('click', async function() {
      var userId = btn.dataset.toggleRole;
      var newRole = btn.dataset.newRole;
      btn.disabled = true;
      btn.textContent = 'Updating...';
      try {
        var token = await getAccessToken();
        var resp = await fetch('/api/update-role', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
          body: JSON.stringify({ user_id: userId, role: newRole })
        });
        var result = await resp.json();
        if (result.success) {
          await loadAdminData();
          render();
        } else {
          alert(result.error || 'Failed to update role');
          btn.disabled = false;
          btn.textContent = 'Make ' + newRole;
        }
      } catch(e) {
        alert('Network error');
        btn.disabled = false;
        btn.textContent = 'Make ' + newRole;
      }
    });
  });

  bindAvatarClicks();
  bindPriorityQueueEvents();
}

// Valid DB statuses (uppercase as stored in Supabase)
const VALID_DB_STATUSES = [
  'TALENT INTRODUCED', 'INTERVIEW SCHEDULED', 'PENDING DECISION',
  'PENDING 2ND INTERVIEW', 'HIRED-PENDING SOW', 'ACTIVE', 'REJECTED',
  'ENGAGEMENT COMPLETED', 'ON-HOLD', 'CANCELLED', 'CONSIDER FOR OTHER ROLE',
  'REMOVED DUE TO LOCATION', 'TALENT NO LONGER AVAILABLE', 'TALENT WITHDRAWN'
];

// Build rich context from live data for Claude
function buildChatContext() {
  var lines = [];

  // Compact: only open roles (what Claude needs to assign candidates)
  var cancelSt = new Set(['ROLE CANCELLED/FILED', 'REQ COMPLETE', 'ENGAGEMENT COMPLETED']);
  var openJobs = (FULFILLMENT_DATA || []).filter(function(j) { return !cancelSt.has(j.status); });

  // Group by BU → compact role list
  var byBU = {};
  openJobs.forEach(function(j) {
    var bu = j.bu || 'Unknown';
    if (!byBU[bu]) byBU[bu] = [];
    var unfilled = (j.openings || 1) - (j.hired_count || 0);
    byBU[bu].push(j.role_title + ' (id:' + j.id + ', ' + unfilled + ' needed, ' + (j.active_candidates || 0) + ' active)');
  });

  lines.push('OPEN ROLES:');
  Object.keys(byBU).sort().forEach(function(bu) {
    lines.push(bu + ': ' + byBU[bu].join('; '));
  });

  // Compact candidate list — only names + role + status (no dates/locations to save tokens)
  var candCount = 0;
  var candLines = [];
  PIPELINE_DATA.forEach(function(bu) {
    bu.projects.forEach(function(p) {
      p.talent.forEach(function(t) {
        candCount++;
        candLines.push(t.name + ' → ' + t.role + ' [' + t.status + ']');
      });
    });
  });
  if (candLines.length > 0) {
    lines.push('\nACTIVE CANDIDATES (' + candCount + '): ' + candLines.join('; '));
  }

  lines.push('\nBUs: ' + PIPELINE_DATA.map(function(b){return b.name;}).join(', '));
  lines.push('Jobs: ' + openJobs.length + ' | Active candidates: ' + candCount + ' | Hired: ' + HIRED_DATA.length);
  lines.push('Use query_database for details (dates, locations, IDs) not shown here.');

  return lines.join('\n');
}

// ── Client View Share Modal ──
// Checks for an existing active share first; if found, opens manage mode
async function showClientViewModal(buName, projName) {
  // Find jobs for this project
  var projJobs = FULFILLMENT_DATA.filter(function(j) {
    return j.project_name === projName && j.bu === buName;
  });

  if (projJobs.length === 0) {
    alert('No jobs found for this project.');
    return;
  }

  // Check for an existing active share for this project+bu
  var existingShare = null;
  try {
    var { data: shares } = await sb.from('client_shares')
      .select('*')
      .eq('project_name', projName)
      .eq('bu', buName)
      .eq('is_active', true)
      .order('created_at', { ascending: false })
      .limit(1);
    if (shares && shares.length > 0) existingShare = shares[0];
  } catch (e) { /* ignore, will create new */ }

  _renderClientViewModal(buName, projName, projJobs, existingShare);
}

function _renderClientViewModal(buName, projName, projJobs, existingShare) {
  var isManage = !!existingShare;
  var existingJcIds = isManage ? (existingShare.job_candidate_ids || []) : [];
  var existingJobIds = isManage ? (existingShare.job_ids || []) : [];

  var overlay = document.createElement('div');
  overlay.className = 'cv-share-modal-overlay';
  overlay.id = 'cvShareOverlay';

  var rolesHtml = '';
  projJobs.forEach(function(j) {
    var candCount = (j.candidates || []).length;
    var roleChecked = isManage ? existingJobIds.includes(j.id) : true;
    rolesHtml += '<label class="role-check">' +
      '<input type="checkbox" ' + (roleChecked ? 'checked' : '') + ' value="' + escHTML(j.id) + '" data-role-cb />' +
      '<span>' + escHTML(j.role_title) + ' (' + candCount + ' candidate' + (candCount !== 1 ? 's' : '') + ')</span></label>';
    if (candCount > 0) {
      rolesHtml += '<div class="cv-cand-group" data-role-cands="' + escHTML(j.id) + '"' + (!roleChecked ? ' style="display:none"' : '') + '>';
      rolesHtml += '<div class="cv-cand-group-title">Select candidates to include <span class="cv-cand-select-all" data-select-all="' + escHTML(j.id) + '">Select All</span></div>';

        var candChecked = isManage ? existingJcIds.includes(c.jc_id) : false;
        rolesHtml += '<label class="cv-cand-check">' +
          '<input type="checkbox" ' + (candChecked ? 'checked' : '') + ' value="' + escHTML(c.jc_id) + '" data-cand-cb data-job-id="' + escHTML(j.id) + '" />' +
          '<span class="cv-cand-name">' + escHTML(c.name) + '</span>' +
          '<span class="cv-cand-status">' + escHTML(c.status || '') + '</span>' +
          '</label>';
      });
      rolesHtml += '</div>';
    }
  });

  var title = isManage ? 'Manage Client View for ' + escHTML(projName) : 'Create Client View for ' + escHTML(projName);
  var btnLabel = isManage ? 'Update Share' : 'Generate Link';
  var emailVal = isManage ? (existingShare.allowed_emails || []).join(', ') : '';

  var modalHtml = '<div class="cv-share-modal">' +

    '<label>Client Email Addresses</label>' +
    '<input type="text" id="cvShareEmails" placeholder="email@company.com, email2@company.com" value="' + escHTML(emailVal) + '" />' +
    '<label>Client Logo URL (optional)</label>' +
    '<input type="url" id="cvShareLogo" placeholder="https://example.com/logo.png" value="' + escHTML(logoVal) + '" />' +
    '<div class="cv-share-result" id="cvShareResult"' + (isManage ? ' style="display:block"' : '') + '>' +
      '<label>Share Link</label>' +
      '<input type="text" id="cvShareLink" readonly onclick="this.select()" value="' + (isManage ? escHTML(window.location.origin + '/client?token=' + existingShare.token) : '') + '" />' +
    '</div>' +
    '<div style="margin-top:16px;">' +
      '<button class="cv-share-btn" id="cvShareGenBtn">' + btnLabel + '</button>' +
      '<button class="cv-share-btn-cancel" id="cvShareCancelBtn">Cancel</button>' +
      (isManage ? '<button class="cv-share-btn-cancel" id="cvShareNewBtn" style="margin-left:4px;color:#204ECF;">+ New Share</button>' : '') +
    '</div>' +
  '</div>';

  overlay.innerHTML = modalHtml;
  document.body.appendChild(overlay);

  document.getElementById('cvShareGenBtn').addEventListener('click', function() {
    if (isManage) {
      updateClientShare(existingShare.id, buName, projName);
    } else {
      createClientShare(buName, projName);
    }
  });
  document.getElementById('cvShareCancelBtn').addEventListener('click', function() {
    var el = document.getElementById('cvShareOverlay');
    if (el) el.remove();
  });
  if (isManage) {
    document.getElementById('cvShareNewBtn').addEventListener('click', function() {
      var el = document.getElementById('cvShareOverlay');
      if (el) el.remove();
      _renderClientViewModal(buName, projName, projJobs, null);
    });
  }
  overlay.addEventListener('click', function(e) {
    if (e.target === overlay) overlay.remove();
  });

  // When a role checkbox is unchecked, uncheck all its candidates
  overlay.querySelectorAll('[data-role-cb]').forEach(function(roleCb) {
    roleCb.addEventListener('change', function() {
      var jobId = this.value;
      var candGroup = overlay.querySelector('[data-role-cands="' + jobId + '"]');
      if (candGroup) {
        candGroup.style.display = this.checked ? 'block' : 'none';
        if (!this.checked) {
          candGroup.querySelectorAll('[data-cand-cb]').forEach(function(cb) { cb.checked = false; });
        }
      }
    });
  });

  // "Select All" links
  overlay.querySelectorAll('[data-select-all]').forEach(function(link) {
    link.addEventListener('click', function(e) {
      e.preventDefault();
      var jobId = this.getAttribute('data-select-all');
      var group = overlay.querySelector('[data-role-cands="' + jobId + '"]');
      if (!group) return;
      var cbs = group.querySelectorAll('[data-cand-cb]');
      var allChecked = Array.from(cbs).every(function(cb) { return cb.checked; });
      cbs.forEach(function(cb) { cb.checked = !allChecked; });
      this.textContent = allChecked ? 'Select All' : 'Deselect All';
    });
  });
}

// Collect selected job IDs and candidate IDs from the modal
function _collectShareSelections() {
  var roleCheckboxes = document.querySelectorAll('#cvShareRoles [data-role-cb]:checked');
  var jobIds = [];
  roleCheckboxes.forEach(function(cb) { jobIds.push(cb.value); });

  if (jobIds.length === 0) {
    alert('Please select at least one role.');
    return null;
  }

  var candCheckboxes = document.querySelectorAll('#cvShareRoles [data-cand-cb]:checked');
  var jobCandidateIds = [];
  candCheckboxes.forEach(function(cb) {
    if (jobIds.includes(cb.getAttribute('data-job-id'))) {
      jobCandidateIds.push(cb.value);
    }
  });

  if (jobCandidateIds.length === 0) {
    alert('Please select at least one candidate to share with the client.');
    return null;
  }

  var emailsRaw = document.getElementById('cvShareEmails').value.trim();
  if (!emailsRaw) {
    alert('Please enter at least one client email address.');
    return null;
  }
  var emails = emailsRaw.split(',').map(function(e) { return e.trim().toLowerCase(); }).filter(function(e) { return e.length > 0; });
  if (emails.length === 0) {
    alert('Please enter valid email addresses.');
    return null;
  }

  var logoUrl = document.getElementById('cvShareLogo').value.trim() || null;

  return { jobIds: jobIds, jobCandidateIds: jobCandidateIds, emails: emails, logoUrl: logoUrl };
}

async function createClientShare(buName, projName) {
  var sel = _collectShareSelections();
  if (!sel) return;

  try {
    var { data, error } = await sb.from('client_shares').insert({
      project_name: projName,
      bu: buName,
      job_ids: sel.jobIds,
      job_candidate_ids: sel.jobCandidateIds,
      allowed_emails: sel.emails,
      client_logo_url: sel.logoUrl,
      created_by: currentUser.id
    }).select();

    if (error) throw error;

    var token = data[0].token;
    var shareUrl = window.location.origin + '/client?token=' + token;

    document.getElementById('cvShareLink').value = shareUrl;
    document.getElementById('cvShareResult').style.display = 'block';
    document.getElementById('cvShareGenBtn').textContent = 'Link Generated!';
    document.getElementById('cvShareGenBtn').disabled = true;

    await logActivity('client_share', data[0].id, 'create', { note: 'Client view created for ' + projName + ' — shared with ' + sel.emails.join(', ') });
  } catch (err) {
    console.error('Error creating client share:', err);
    alert('Failed to create client share: ' + (err.message || 'Unknown error'));
  }
}

async function updateClientShare(shareId, buName, projName) {
  var sel = _collectShareSelections();
  if (!sel) return;

  try {
    var { error } = await sb.from('client_shares').update({
      job_ids: sel.jobIds,
      job_candidate_ids: sel.jobCandidateIds,
      allowed_emails: sel.emails,
      client_logo_url: sel.logoUrl,
      updated_at: new Date().toISOString()
    }).eq('id', shareId);

    if (error) throw error;

    document.getElementById('cvShareGenBtn').textContent = '✅ Updated!';
    document.getElementById('cvShareGenBtn').disabled = true;
    setTimeout(function() {
      document.getElementById('cvShareGenBtn').textContent = 'Update Share';
      document.getElementById('cvShareGenBtn').disabled = false;
    }, 2000);

    await logActivity('client_share', shareId, 'update', { note: 'Client view updated for ' + projName + ' — ' + sel.jobCandidateIds.length + ' candidates selected' });
  } catch (err) {
    console.error('Error updating client share:', err);
    alert('Failed to update client share: ' + (err.message || 'Unknown error'));
  }
}

async function sendCandidateToClientView(jcId, shareId, btnEl, submissionNotes) {
  btnEl.disabled = true;
  btnEl.textContent = 'Sending…';
  try {
    // Fetch current share to get existing job_candidate_ids
    var { data: shareData, error: fetchErr } = await sb.from('client_shares').select('job_candidate_ids, job_ids').eq('id', shareId).single();
    if (fetchErr) throw fetchErr;

    var currentIds = shareData.job_candidate_ids || [];
    if (currentIds.includes(jcId)) {
      await loadActiveShares();
      render();
      return;
    }

    // Save submission notes to job_candidates if provided
    if (submissionNotes) {
      await sb.from('job_candidates').update({ submission_notes: submissionNotes }).eq('id', jcId);
    }

    var updatedIds = currentIds.concat([jcId]);
    var now = new Date().toISOString();
    var { error: updateErr } = await sb.from('client_shares').update({
      job_candidate_ids: updatedIds,
      updated_at: now
    }).eq('id', shareId);

    if (updateErr) throw updateErr;

    await logActivity('client_share', shareId, 'add_candidate', { note: 'Candidate sent to client view' + (submissionNotes ? ' with notes' : '') });

    // Refresh share data and re-render
    await loadActiveShares();
    render();
  } catch (err) {
    console.error('Error sending candidate to client view:', err);
    alert('Failed to send candidate: ' + (err.message || 'Unknown error'));
    btnEl.disabled = false;
    btnEl.textContent = 'Send to Client';
  }
}

// Remove a candidate from an existing client view share
async function removeCandidateFromClientView(jcId, shareId) {
  try {
    var { data: shareData, error: fetchErr } = await sb.from('client_shares').select('job_candidate_ids').eq('id', shareId).single();
    if (fetchErr) throw fetchErr;

    var currentIds = shareData.job_candidate_ids || [];
    var updatedIds = currentIds.filter(function(id) { return id !== jcId; });

    var { error: updateErr } = await sb.from('client_shares').update({
      job_candidate_ids: updatedIds,
      updated_at: new Date().toISOString()
    }).eq('id', shareId);

    if (updateErr) throw updateErr;

    await logActivity('client_share', shareId, 'remove_candidate', { note: 'Candidate removed from client view' });
    await loadActiveShares();
    render();
  } catch (err) {
    console.error('Error removing candidate from client view:', err);
    alert('Failed to remove candidate: ' + (err.message || 'Unknown error'));
  }
}

// Execute a tool call from Claude against Supabase
async function logActivity(entityType, entityId, action, opts) {
  opts = opts || {};
  try {
    await sb.from('activity_log').insert({
      entity_type: entityType,
      entity_id: entityId,
      action: action,
      old_value: opts.old_value || null,
      new_value: opts.new_value || null,
      note: opts.note || null,
      source: 'chat',
      created_by: currentUser ? currentUser.id : null
    });
  } catch(e) { /* non-blocking */ }
}

async function executeTool(toolName, toolInput) {
  switch (toolName) {
    case 'insert_job': {
      var row = {
        bu: toolInput.bu, project_name: toolInput.project_name,
        role_title: toolInput.role_title, openings: toolInput.openings || 1,
        created_by: currentUser ? currentUser.id : null,
      };
      if (toolInput.rate_max) row.rate_max = toolInput.rate_max;
      if (toolInput.duration) row.duration = toolInput.duration;
      if (toolInput.poc_names) row.poc_names = toolInput.poc_names;
      if (toolInput.poc_emails) row.poc_emails = toolInput.poc_emails;
      if (toolInput.notes) row.notes = toolInput.notes;
      if (toolInput.sow_number) row.sow_number = toolInput.sow_number;
      if (toolInput.salesforce_link) row.salesforce_link = toolInput.salesforce_link;
      if (toolInput.toptal_job_link) row.toptal_job_link = toolInput.toptal_job_link;
      var { data, error } = await sb.from('jobs').insert(row).select();
      if (error) return { error: error.message };
      await logActivity('job', data[0].id, 'insert', { note: row.role_title + ' (' + row.bu + ')' });
      return { success: true, job: data[0] };
    }
    case 'update_job': {
      toolInput.updates.updated_by = currentUser ? currentUser.id : null;
      var { data, error } = await sb.from('jobs')
        .update(toolInput.updates).eq('id', toolInput.job_id).select();
      if (error) return { error: error.message };
      await logActivity('job', toolInput.job_id, 'update', { new_value: JSON.stringify(toolInput.updates) });
      return { success: true, job: data[0] };
    }
    case 'insert_candidate': {
      var row = { name: toolInput.name, created_by: currentUser ? currentUser.id : null };
      if (toolInput.profile_link) row.profile_link = toolInput.profile_link;
      if (toolInput.location) row.location = toolInput.location;
      if (toolInput.rate) row.rate = toolInput.rate;
      if (toolInput.pst_overlap) row.pst_overlap = toolInput.pst_overlap;
      if (toolInput.availability) row.availability = toolInput.availability;
      if (toolInput.notes) row.notes = toolInput.notes;
      if (toolInput.avatar_url) row.avatar_url = toolInput.avatar_url;
      var { data, error } = await sb.from('candidates').insert(row).select();
      if (error) return { error: error.message };
      await logActivity('candidate', data[0].id, 'insert', { note: toolInput.name });
      return { success: true, candidate: data[0] };
    }
    case 'update_candidate': {
      var candId = toolInput.candidate_id;
      if (!candId && toolInput.candidate_name) {
        var { data: matches, error: findErr } = await sb.from('candidates').select('id, name')
          .ilike('name', '%' + toolInput.candidate_name + '%').limit(1);
        if (findErr) return { error: findErr.message };
        if (!matches || matches.length === 0) return { error: 'No candidate found matching "' + toolInput.candidate_name + '"' };
        candId = matches[0].id;
      }
      if (!candId) return { error: 'Provide candidate_id or candidate_name' };
      var updates = toolInput.updates || {};
      updates.updated_by = currentUser ? currentUser.id : null;
      var { data, error } = await sb.from('candidates').update(updates).eq('id', candId).select();
      if (error) return { error: error.message };
      await logActivity('candidate', candId, 'update', { new_value: JSON.stringify(updates) });
      return { success: true, candidate: data[0] };
    }
    case 'assign_candidate_to_job': {
      var row = {
        job_id: toolInput.job_id,
        candidate_id: toolInput.candidate_id,
        status: toolInput.status || 'TALENT INTRODUCED',
        date_introduced: new Date().toISOString().split('T')[0],
        updated_by: currentUser ? currentUser.id : null
      };
      var { data, error } = await sb.from('job_candidates').insert(row).select();
      if (error) return { error: error.message };
      await logActivity('job_candidate', data[0].id, 'assign', { new_value: row.status });
      return { success: true, record: data[0] };
    }
    case 'update_candidate_status': {
      // Find the job_candidates record by candidate name
      var query = sb.from('job_candidates').select('*, candidates(name)');
      if (toolInput.job_id) query = query.eq('job_id', toolInput.job_id);
      var { data: records, error: findErr } = await query;
      if (findErr) return { error: findErr.message };
      var match = records.find(function(r) {
        return r.candidates && r.candidates.name &&
          r.candidates.name.toLowerCase().includes(toolInput.candidate_name.toLowerCase());
      });
      if (!match) return { error: 'No candidate found matching "' + toolInput.candidate_name + '"' };
      var oldStatus = match.status;
      var { data, error } = await sb.from('job_candidates')
        .update({ status: toolInput.new_status, updated_at: new Date().toISOString(), updated_by: currentUser ? currentUser.id : null })
        .eq('id', match.id).select();
      if (error) return { error: error.message };
      await logActivity('job_candidate', match.id, 'status_change', { old_value: oldStatus, new_value: toolInput.new_status, note: match.candidates.name });
      return { success: true, updated: data[0], candidate_name: match.candidates.name };
    }
    case 'update_job_candidate_fields': {
      var jcId = toolInput.job_candidates_id;
      if (!jcId && toolInput.candidate_name) {
        var query = sb.from('job_candidates').select('id, candidates(name)');
        if (toolInput.job_id) query = query.eq('job_id', toolInput.job_id);
        var { data: recs } = await query;
        var m = (recs || []).find(function(r) {
          return r.candidates && r.candidates.name &&
            r.candidates.name.toLowerCase().includes(toolInput.candidate_name.toLowerCase());
        });
        if (m) jcId = m.id;
      }
      if (!jcId) return { error: 'Could not find job_candidates record' };
      toolInput.updates.updated_at = new Date().toISOString();
      toolInput.updates.updated_by = currentUser ? currentUser.id : null;
      var { data, error } = await sb.from('job_candidates')
        .update(toolInput.updates).eq('id', jcId).select();
      if (error) return { error: error.message };
      await logActivity('job_candidate', jcId, 'update', { new_value: JSON.stringify(toolInput.updates) });
      return { success: true, updated: data[0] };
    }
    case 'delete_job': {
      // Delete associated job_candidates first
      await sb.from('job_candidates').delete().eq('job_id', toolInput.job_id);
      var { error } = await sb.from('jobs').delete().eq('id', toolInput.job_id);
      if (error) return { error: error.message };
      await logActivity('job', toolInput.job_id, 'delete');
      return { success: true, deleted_job_id: toolInput.job_id };
    }
    case 'query_database': {
      var query = sb.from(toolInput.table).select(toolInput.select || '*');
      if (toolInput.filters) {
        toolInput.filters.forEach(function(f) {
          if (f.op === 'like' || f.op === 'ilike') query = query[f.op](f.column, f.value);
          else query = query.filter(f.column, f.op, f.value);
        });
      }
      query = query.limit(toolInput.limit || 50);
      var { data, error } = await query;
      if (error) return { error: error.message };
      return { results: data, count: data.length };
    }
    default:
      return { error: 'Unknown tool: ' + toolName };
  }
}

function generateBriefing() {
  var html = '<h3>\uD83D\uDCCB Daily Pipeline Briefing</h3>';
  var cancelledStatuses = new Set(['ROLE CANCELLED/FILED', 'REQ COMPLETE', 'ENGAGEMENT COMPLETED', 'TALENT WITHDRAWN', 'TALENT NO LONGER AVAILABLE', 'FUTURE NEED']);
  var activeJobs = FULFILLMENT_DATA.filter(function(j) { return !cancelledStatuses.has(j.status); });

  // 🎯 Closest to Hire
  var closestToHire = [];
  activeJobs.forEach(function(j) {
    (j.candidates || []).forEach(function(c) {
      if (c._status === 'pending_decision' || c._status === 'pending_2nd_interview') {
        closestToHire.push({ name: c.name, role: j.role_title, bu: j.bu, status: c._status });
      }
    });
  });
  html += '<h3>\uD83C\uDFAF Closest to Hire</h3>';
  if (closestToHire.length > 0) {
    html += '<ul>';
    closestToHire.slice(0, 8).forEach(function(item) {
      var buColor = BU_COLORS[item.bu] || DEFAULT_BU_COLOR;
      var statusLabel = item.status === 'pending_decision' ? 'Pending Decision' : 'Pending 2nd Interview';
      html += '<li><strong>' + escHTML(item.name) + '</strong> for ' + escHTML(item.role) +
        '<span class="bu-tag" style="background:' + buColor + '">' + escHTML(item.bu) + '</span>' +
        ' \u2014 ' + statusLabel + '. Follow up today.</li>';
    });
    html += '</ul>';
  } else {
    html += '<ul><li>No candidates in final stages right now.</li></ul>';
  }

  // ⚠️ Going Cold
  var goingCold = activeJobs.filter(function(j) {
    return j.days_since_contact !== null && j.days_since_contact >= 14 && (j.active_candidates || 0) > 0;
  }).sort(function(a, b) { return b.days_since_contact - a.days_since_contact; });
  html += '<h3>\u26A0\uFE0F Going Cold</h3>';
  if (goingCold.length > 0) {
    html += '<ul>';
    goingCold.slice(0, 6).forEach(function(j) {
      var aging = computeAgingBand(j.days_since_contact);
      var buColor = BU_COLORS[j.bu] || DEFAULT_BU_COLOR;
      html += '<li><strong>' + escHTML(j.role_title) + '</strong>' +
        '<span class="bu-tag" style="background:' + buColor + '">' + escHTML(j.bu) + '</span>' +
        ' \u2014 <span style="color:' + aging.color + ';font-weight:600">' + j.days_since_contact + ' days</span> since last contact</li>';
    });
    html += '</ul>';
  } else {
    html += '<ul><li>All active roles have recent contact. Nice!</li></ul>';
  }

  // 🔴 Empty Pipelines
  var emptyPipelines = activeJobs.filter(function(j) { return (j.total_candidates || 0) === 0; });
  html += '<h3>\uD83D\uDD34 Empty Pipelines</h3>';
  if (emptyPipelines.length > 0) {
    html += '<ul>';
    emptyPipelines.slice(0, 6).forEach(function(j) {
      var buColor = BU_COLORS[j.bu] || DEFAULT_BU_COLOR;
      html += '<li><strong>' + escHTML(j.role_title) + '</strong>' +
        '<span class="bu-tag" style="background:' + buColor + '">' + escHTML(j.bu) + '</span>' +
        ' \u2014 needs candidates ASAP</li>';
    });
    html += '</ul>';
  } else {
    html += '<ul><li>All roles have at least one candidate. Great coverage!</li></ul>';
  }

  // 🏆 Recent Wins
  var recentHires = [];
  HIRED_DATA.forEach(function(h) {
    if (h.date_hired && daysSince(h.date_hired) <= 14) {
      recentHires.push(h);
    }
  });
  html += '<h3>\uD83C\uDFC6 Recent Wins</h3>';
  if (recentHires.length > 0) {
    html += '<ul>';
    recentHires.slice(0, 5).forEach(function(h) {
      html += '<li>\u2705 <strong>' + escHTML(h.talent_name || h.name || 'Unknown') + '</strong> hired for ' +
        escHTML(h.role_title || h.job_title || '') + ' \u2014 ' + fmtDate(h.date_hired) + '</li>';
    });
    html += '</ul>';
  } else {
    html += '<ul><li>No hires in the last two weeks.</li></ul>';
  }

  // 📋 Today's Top 3 Actions
  var actions = generatePriorityActions(FULFILLMENT_DATA);
  html += '<h3>\uD83D\uDCCB Today\'s Top 3 Actions</h3>';
  if (actions.length > 0) {
    actions.slice(0, 3).forEach(function(a, i) {
      html += '<div class="briefing-action"><strong>' + (i + 1) + '. ' + escHTML(a.title) + ':</strong> ' + escHTML(a.description) + '</div>';
    });
  } else {
    html += '<div class="briefing-action">No urgent actions \u2014 pipeline is looking healthy!</div>';
  }

  return html;
}

function generateNotifications() {
  var notifs = [];
  var cancelledStatuses = new Set(['ROLE CANCELLED/FILED', 'REQ COMPLETE', 'ENGAGEMENT COMPLETED', 'TALENT WITHDRAWN', 'TALENT NO LONGER AVAILABLE', 'FUTURE NEED']);

  FULFILLMENT_DATA.forEach(function(j) {
    if (cancelledStatuses.has(j.status)) return;

    // CRITICAL: 30+ days since contact
    if (j.days_since_contact !== null && j.days_since_contact >= 30) {
      var isPersistent = j.days_since_contact >= 30 && (j.active_candidates || 0) === 0;
      notifs.push({
        id: 'critical-stale-' + j.id,
        severity: 'critical',
        icon: '\uD83D\uDD34',
        text: escHTML(j.role_title) + ' (' + escHTML(j.bu) + ') \u2014 ' + j.days_since_contact + ' days with no contact',
        persistent: isPersistent
      });
    }

    // WARNING: zero candidates
    if ((j.total_candidates || 0) === 0) {
      notifs.push({
        id: 'empty-' + j.id,
        severity: 'warning',
        icon: '\u26A0\uFE0F',
        text: escHTML(j.role_title) + ' (' + escHTML(j.bu) + ') has zero candidates',
        persistent: false
      });
    }

    // WARNING: stuck in introduced 21+ days
    (j.candidates || []).forEach(function(c) {
      if (c._status === 'introduced' && c.date_introduced && daysSince(c.date_introduced) >= 21) {
        notifs.push({
          id: 'stuck-' + j.id + '-' + (c.name || '').replace(/\s/g, ''),
          severity: 'warning',
          icon: '\u23F3',
          text: escHTML(c.name) + ' stuck in Introduced for ' + daysSince(c.date_introduced) + 'd on ' + escHTML(j.role_title),
          persistent: false
        });
      }
    });

    // SUCCESS: recent hires (within 7 days)
    (j.candidates || []).forEach(function(c) {
      if (c._status === 'hired' && c.date_hired && daysSince(c.date_hired) <= 7) {
        notifs.push({
          id: 'hired-' + j.id + '-' + (c.name || '').replace(/\s/g, ''),
          severity: 'success',
          icon: '\uD83C\uDF89',
          text: escHTML(c.name) + ' hired for ' + escHTML(j.role_title) + '!',
          persistent: false
        });
      }
    });
  });

  return notifs;
}

function isDismissed(id) {
  try {
    var dismissed = JSON.parse(sessionStorage.getItem('dismissed_notifications') || '[]');
    return dismissed.indexOf(id) !== -1;
  } catch(e) { return false; }
}

function dismissNotification(id) {
  try {
    var dismissed = JSON.parse(sessionStorage.getItem('dismissed_notifications') || '[]');
    if (dismissed.indexOf(id) === -1) dismissed.push(id);
    sessionStorage.setItem('dismissed_notifications', JSON.stringify(dismissed));
  } catch(e) {}
  renderNotifications();
  var notifs = generateNotifications();
  var unread = notifs.filter(function(n) { return !isDismissed(n.id); });
  var badge = document.querySelector('.notif-badge');
  if (badge) {
    if (unread.length > 0) { badge.textContent = unread.length; badge.style.display = 'flex'; }
    else { badge.style.display = 'none'; }
  }
}

function dismissAllNotifications() {
  var notifs = generateNotifications();
  var dismissed = [];
  notifs.forEach(function(n) { if (!n.persistent) dismissed.push(n.id); });
  sessionStorage.setItem('dismissed_notifications', JSON.stringify(dismissed));
  renderNotifications();
  var badge = document.querySelector('.notif-badge');
  var remaining = notifs.filter(function(n) { return n.persistent; });
  if (badge) {
    if (remaining.length > 0) { badge.textContent = remaining.length; badge.style.display = 'flex'; }
    else { badge.style.display = 'none'; }
  }
}

function renderNotifications() {
  var dd = document.getElementById('notifDropdown');
  if (!dd) return;
  var notifs = generateNotifications();
  var visible = notifs.filter(function(n) { return n.persistent || !isDismissed(n.id); });

  var headerEl = document.createElement('div');
  headerEl.className = 'notif-dropdown-header';
  var headerLabel = document.createElement('span');
  headerLabel.textContent = 'Notifications (' + visible.length + ')';
  var dismissBtn = document.createElement('button');
  dismissBtn.className = 'notif-dismiss-all';
  dismissBtn.textContent = 'Dismiss All';
  dismissBtn.addEventListener('click', dismissAllNotifications);
  headerEl.appendChild(headerLabel);
  headerEl.appendChild(dismissBtn);

  dd.textContent = '';
  dd.appendChild(headerEl);

  if (visible.length === 0) {
    var emptyEl = document.createElement('div');
    emptyEl.className = 'notif-empty';
    emptyEl.textContent = 'All caught up! No notifications.';
    dd.appendChild(emptyEl);
  } else {
    visible.forEach(function(n) {
      var card = document.createElement('div');
      card.className = 'notif-card' + (n.persistent ? ' notif-persistent' : '');
      var iconSpan = document.createElement('span');
      iconSpan.className = 'notif-icon';
      iconSpan.textContent = n.icon;
      var textSpan = document.createElement('span');
      textSpan.className = 'notif-text';
      textSpan.textContent = '';
      // n.text is already escaped HTML, set via innerHTML safely (escHTML'd data only)
      var textContainer = document.createElement('span');
      textContainer.className = 'notif-text';
      textContainer.innerHTML = n.text;
      var dismissBtn = document.createElement('button');
      dismissBtn.className = 'notif-dismiss-btn';
      dismissBtn.title = 'Dismiss';
      dismissBtn.textContent = '\u2715';
      dismissBtn.addEventListener('click', (function(nid) {
        return function() { dismissNotification(nid); };
      })(n.id));
      card.appendChild(iconSpan);
      card.appendChild(textContainer);
      card.appendChild(dismissBtn);
      dd.appendChild(card);
    });
  }
}
